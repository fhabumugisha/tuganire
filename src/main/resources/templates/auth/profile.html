<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{profile.page.title}">Mon profil</title>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="min-h-screen bg-base-100" x-data="profilePage()">

            <!-- Onglets horizontaux (Desktop et Mobile) -->
            <div class="border-b border-base-300 bg-base-100 sticky top-0 z-10">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <nav class="flex gap-8" role="tablist">

                        <!-- Profile Tab -->
                        <button @click="activeTab = 'profile'"
                                class="flex items-center gap-2 px-1 py-4 text-sm font-medium border-b-2 transition-colors"
                                :class="activeTab === 'profile'
                                    ? 'border-primary text-primary'
                                    : 'border-transparent text-base-content/70 hover:text-base-content hover:border-base-300'"
                                role="tab"
                                :aria-selected="activeTab === 'profile'">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            <span th:text="#{profile.tab.profile}">Profil</span>
                        </button>

                        <!-- Subscription Tab -->
                        <button @click="activeTab = 'subscription'"
                                class="flex items-center gap-2 px-1 py-4 text-sm font-medium border-b-2 transition-colors"
                                :class="activeTab === 'subscription'
                                    ? 'border-primary text-primary'
                                    : 'border-transparent text-base-content/70 hover:text-base-content hover:border-base-300'"
                                role="tab"
                                :aria-selected="activeTab === 'subscription'">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                            </svg>
                            <span th:text="#{profile.tab.subscription}">Abonnement</span>
                        </button>

                        <!-- Security Tab -->
                        <button @click="activeTab = 'security'"
                                class="flex items-center gap-2 px-1 py-4 text-sm font-medium border-b-2 transition-colors"
                                :class="activeTab === 'security'
                                    ? 'border-primary text-primary'
                                    : 'border-transparent text-base-content/70 hover:text-base-content hover:border-base-300'"
                                role="tab"
                                :aria-selected="activeTab === 'security'">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                            <span th:text="#{profile.tab.security}">Sécurité</span>
                        </button>

                    </nav>
                </div>
            </div>

            <!-- Main Content Area (Full Width) -->
            <main class="py-8">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

                    <!-- Profile Tab -->
                    <div x-show="activeTab === 'profile'"
                         x-cloak
                         role="tabpanel"
                         :aria-hidden="activeTab !== 'profile'">
                        <div th:replace="~{auth/profile/tab-profile :: content}"></div>
                    </div>

                    <!-- Subscription Tab -->
                    <div x-show="activeTab === 'subscription'"
                         x-cloak
                         role="tabpanel"
                         :aria-hidden="activeTab !== 'subscription'">
                        <div th:replace="~{auth/profile/tab-subscription :: content}"></div>
                    </div>

                    <!-- Security Tab -->
                    <div x-show="activeTab === 'security'"
                         x-cloak
                         role="tabpanel"
                         :aria-hidden="activeTab !== 'security'">
                        <div th:replace="~{auth/profile/tab-security :: content}"></div>
                    </div>

                </div>
            </main>

        </div>

        <!-- Alpine.js Component -->
        <script th:inline="javascript">
            document.addEventListener('alpine:init', () => {
                Alpine.data('profilePage', () => ({
                    activeTab: 'profile'
                }));
            });
        </script>
    </div>
</body>
</html>
