<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
    Table skeleton placeholder.
    Usage: <div th:replace="~{fragments/skeleton-table :: skeleton-table(rows=5, cols=4)}"></div>
-->
<div th:fragment="skeleton-table(rows, cols)"
     class="bg-base-100 border border-base-200 rounded-xl overflow-hidden"
     th:with="rows=${rows ?: 5}, cols=${cols ?: 4}">
    <div class="px-4 py-3 border-b border-base-200 flex items-center justify-between">
        <div class="h-4 w-32 bg-base-200 rounded animate-pulse"></div>
        <div class="h-8 w-48 bg-base-200 rounded animate-pulse"></div>
    </div>
    <table class="w-full">
        <tbody>
            <tr th:each="r : ${#numbers.sequence(1, rows)}" class="border-t border-base-200/60">
                <td th:each="c : ${#numbers.sequence(1, cols)}" class="px-4 py-3">
                    <div class="h-4 bg-base-200 rounded animate-pulse"
                         th:style="'width: ' + ${c == 1 ? '40%' : (c == cols ? '20%' : '60%')}"></div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
