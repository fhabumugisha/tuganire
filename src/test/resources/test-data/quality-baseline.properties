# Committed quality baseline for TranslationQualityIT.
# Update intentionally (with review) when post-processor rules legitimately change outputs.
# The IT fails the build if the aggregate correction score regresses more than 5% vs this baseline.
#
# baseline.score: fraction of corpus phrases where the post-processor output matches the native correction
# (computed over the 68-phrase llm-errors-corpus.csv; phrases with category=NONE are always scored as correct)
baseline.score=0.75
baseline.corpus.size=68
