spring:
  application:
    name: tuganire-backend
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      # Read/connect timeout applied to every OpenAI HTTP call. Keep it short enough that a stuck
      # primary call doesn't hold the request thread — the orchestrator will then retry via the
      # configured fallback provider (see TranslationServiceImpl.translateWithFallback).
      timeout: 20s
      chat:
        options:
          # NOTE: model + temperature are set per-call by OpenAiLlmProvider
          # (the active model lives in LlmSettings; GPT-5.x rejects custom temperature
          # so we omit it for those models). Don't put `temperature` here — it
          # becomes a default merged into every call and breaks GPT-5.x.
          model: gpt-5.5
      audio:
        transcription:
          options:
            model: whisper-1
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      # Same rationale as `spring.ai.openai.timeout` — caps the time a Claude call can hold the
      # request thread before the fallback kicks in.
      timeout: 20s
      chat:
        options:
          # NOTE: model + temperature are set per-call by ClaudeLlmProvider
          # (the active model lives in LlmSettings). Don't put `temperature` here
          # — it would override the per-call value silently.
          model: claude-haiku-4-5-20251001
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tuganire}
    username: ${DATABASE_USER:tuganire}
    password: ${DATABASE_PASSWORD:tuganire}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  threads:
    virtual:
      enabled: true
  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  web:
    locale: fr
    resources:
      cache:
        cachecontrol:
          max-age: 31536000
          cache-public: true
          must-revalidate: true
        use-last-modified: true
  mvc:
    async:
      request-timeout: 300000
  servlet:
    multipart:
      enabled: true
      max-file-size: 4MB
      max-request-size: 20MB
      file-size-threshold: 2KB

server:
  forward-headers-strategy: native
  port: ${PORT:8080}

tuganire:
  tts:
    # Only two providers are registered: Proto.cx (default) and MMS (fallback).
    default-provider: proto
    # Kinyarwanda voice: Proto.cx native voice (falls back to MMS when unconfigured or on error).
    kiny-provider: ${KINY_TTS_PROVIDER:proto}
    # French is not modelled by Proto, so route it to the local MMS voice.
    french-provider: mms
  # Proto.cx Voice API (native Kinyarwanda TTS). Secrets are env-driven; blank → MMS fallback.
  proto:
    base-url: ${PROTO_TTS_URL:https://v3-api.proto.cx/api}
    subcompany-id: ${PROTO_TTS_SUBCOMPANY_ID:}
    token: ${PROTO_TTS_TOKEN:}
    gender: ${PROTO_TTS_GENDER:female}
  stt:
    default-provider: whisper
  llm:
    default-provider: openai
    fallback-provider: anthropic
    # Models selectable in /settings for FR→RW translation (runtime-switchable, cross-provider).
    # Each option carries the provider that owns it so the pipeline routes correctly.
    default-translation-model: gpt-5.5
    translation-models:
      - id: gpt-5.5
        provider: openai
        label: GPT-5.5 (OpenAI)
      - id: gpt-5.4-mini
        provider: openai
        label: GPT-5.4 mini (OpenAI)
      - id: claude-sonnet-4-6
        provider: anthropic
        label: Claude Sonnet 4.6 (Anthropic)
      - id: gpt-4o
        provider: openai
        label: GPT-4o (OpenAI, ancien)
    openai:
      # OpenAI models that reject a custom `temperature` (HTTP 400) and only accept their server-side default.
      # OpenAiLlmProvider omits `temperature` when calling any model id listed here. Add a new GPT-5.x reasoning
      # model id whenever one ships; do NOT rely on a name prefix — the lock is opt-in by exact id.
      temperature-locked-models:
        - gpt-5.5
        - gpt-5.4-mini
  # Per-model LLM pricing in USD per 1,000 tokens (used for admin usage-cost estimates).
  ai-models:
    models:
      gpt-5.5:
        input-per1k: 0.005
        output-per1k: 0.03
      gpt-5.4-mini:
        input-per1k: 0.00075
        output-per1k: 0.0045
      gpt-4o:
        input-per1k: 0.0025
        output-per1k: 0.01
      claude-sonnet-4-6:
        input-per1k: 0.003
        output-per1k: 0.015
      claude-haiku-4-5-20251001:
        input-per1k: 0.001
        output-per1k: 0.005
  mms:
    base-url: ${MMS_TTS_URL:http://localhost:8000}
  cache:
    translation-ttl-days: 30
  rate-limit:
    requests-per-minute: 60
    requests-per-day: 1000
  security:
    allowed-origins: ${ALLOWED_ORIGINS:https://tuganire.app,http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    metrics:
      export:
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}

info:
  app:
    name: ${spring.application.name}
    version: '@project.version@'

logging:
  level:
    com.tuganire: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
