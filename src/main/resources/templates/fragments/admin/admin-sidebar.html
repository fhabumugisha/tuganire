<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="sidebar"
     class="w-72 lg:w-64 flex flex-col bg-base-100 border-r border-base-200 lg:sticky lg:top-0 h-[100dvh] max-h-[100dvh] overflow-hidden">

    <!-- Logo / workspace switcher -->
    <div class="h-14 flex items-center justify-between gap-2 px-4 border-b border-base-200 shrink-0">
        <a th:href="@{/admin}" class="flex items-center gap-2 text-base-content font-semibold text-sm min-w-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-primary shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
            </svg>
            <span class="truncate">Tuganire</span>
            <span class="ml-1 badge badge-neutral badge-sm">Admin</span>
        </a>
        <!-- Close button (mobile drawer only) -->
        <label for="admin-drawer" aria-label="Fermer le menu"
               class="lg:hidden btn btn-ghost btn-sm btn-circle text-base-content/60 hover:text-base-content shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
            </svg>
        </label>
    </div>

    <!-- Navigation -->
    <div class="p-4 flex-1 overflow-y-auto">
        <p class="text-xs uppercase tracking-wider text-base-content/40 font-medium mb-3 px-3">Navigation</p>
        <ul class="space-y-1">

            <li>
                <a th:href="@{/admin}"
                   class="relative flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors"
                   th:classappend="${activeNav == 'overview'} ? 'bg-primary/10 text-primary' : 'text-base-content/70 hover:bg-base-200'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                    </svg>
                    <span th:text="#{admin.nav.overview}">Overview</span>
                    <span th:if="${activeNav == 'overview'}"
                          class="absolute left-0 top-1.5 bottom-1.5 w-0.5 bg-primary rounded-r"></span>
                </a>
            </li>

            <li>
                <a th:href="@{/admin/users}"
                   class="relative flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors"
                   th:classappend="${activeNav == 'users'} ? 'bg-primary/10 text-primary' : 'text-base-content/70 hover:bg-base-200'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <span th:text="#{admin.nav.users}">Users</span>
                    <span th:if="${activeNav == 'users'}"
                          class="absolute left-0 top-1.5 bottom-1.5 w-0.5 bg-primary rounded-r"></span>
                </a>
            </li>

            <li>
                <a th:href="@{/admin/llm-usage}"
                   class="relative flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors"
                   th:classappend="${activeNav == 'llm'} ? 'bg-primary/10 text-primary' : 'text-base-content/70 hover:bg-base-200'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    <span th:text="#{admin.nav.llm}">LLM Usage</span>
                    <span th:if="${activeNav == 'llm'}"
                          class="absolute left-0 top-1.5 bottom-1.5 w-0.5 bg-primary rounded-r"></span>
                </a>
            </li>

            <li>
                <a th:href="@{/admin/blog}"
                   class="relative flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors"
                   th:classappend="${activeNav == 'articles'} ? 'bg-primary/10 text-primary' : 'text-base-content/70 hover:bg-base-200'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
                    </svg>
                    <span th:text="#{admin.nav.articles}">Articles</span>
                    <span th:if="${activeNav == 'articles'}"
                          class="absolute left-0 top-1.5 bottom-1.5 w-0.5 bg-primary rounded-r"></span>
                </a>
            </li>

        </ul>
    </div>

    <!-- User menu (Linear / Vercel / Supabase pattern: bottom-left of sidebar) -->
    <div class="p-3 border-t border-base-200 shrink-0"
         th:with="email=${#authentication.name},initial=${#strings.toUpperCase(#strings.substring(email,0,1))}">
        <div class="dropdown dropdown-top dropdown-end w-full">
            <div tabindex="0" role="button"
                 class="flex items-center gap-3 w-full px-2 py-2 rounded-lg hover:bg-base-200 transition-colors cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-primary/15 text-primary text-xs font-semibold
                            flex items-center justify-center overflow-hidden shrink-0">
                    <span th:text="${initial}">U</span>
                </div>
                <div class="flex-1 min-w-0 text-left">
                    <p class="text-sm font-medium text-base-content truncate" th:text="${email}">user@example.com</p>
                    <p class="text-xs text-base-content/50">Admin</p>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-base-content/40 shrink-0"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7l3-3 3 3M7 17l3 3 3-3"/>
                </svg>
            </div>
            <ul tabindex="0"
                class="dropdown-content menu p-2 shadow-lg bg-base-100 rounded-box w-56 border border-base-200 mb-2 z-50">
                <li class="menu-title">
                    <span class="truncate" th:text="${email}">user@example.com</span>
                </li>
                <li>
                    <a th:href="@{/profile}" class="gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <span th:text="#{nav.profile}">Profile</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/dashboard}" class="gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        <span th:text="#{admin.back.to.app}">Back to app</span>
                    </a>
                </li>
                <li>
                    <form th:action="@{/logout}" method="post" class="contents">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="gap-2 text-error w-full text-left">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                            </svg>
                            <span th:text="#{nav.logout}">Logout</span>
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
