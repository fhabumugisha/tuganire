<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Translation bubble fragment.
    Returned by POST /translate (WebController) and swapped into #conversation-list via HTMX.

    Parameters:
      - originalText   : the source text (in sourceLang)
      - translatedText : the translated text (in targetLang)
      - translationId  : unique ID for feedback correlation
      - sessionId      : current anonymous session ID
      - (audio is synthesised lazily via /api/v1/audio/speak.mp3 from translatedText + targetLang)
      - sourceLang     : BCP-47 source code ("fr" or "rw") — drives left bubble label + color
      - targetLang     : BCP-47 target code ("fr" or "rw") — drives right bubble label + color

    Language → color convention (matches the bottom action buttons):
      - "fr" → primary (indigo)
      - "rw" → accent  (amber)
-->
<div th:fragment="bubble(originalText, translatedText, translationId, sessionId, sourceLang, targetLang)"
     class="animate-slide-in-up"
     x-data="{ playing: false }"
     th:id="|bubble-${translationId}|">

    <!-- Source bubble: left-aligned, border + label colored by sourceLang.
         B4: language is conveyed via TEXT (code + localized name) and ARIA label,
         not just border color. -->
    <div class="flex justify-start mb-2"
         th:with="sourceLangName=#{|lang.code.${sourceLang}|}">
        <div class="max-w-[85%] sm:max-w-[70%] rounded-lg rounded-tl-none px-4 py-3 bg-base-200 border-l-4 shadow-sm"
             th:classappend="${sourceLang == 'fr' ? 'border-primary' : 'border-accent'}"
             role="group"
             th:aria-label="#{aria.bubble.source(${sourceLangName})}">
            <p class="text-xs font-medium mb-1 tracking-wide"
               th:classappend="${sourceLang == 'fr' ? 'text-primary/70' : 'text-accent/70'}">
                <span class="uppercase" th:text="${sourceLang}">fr</span>
                <span aria-hidden="true"> · </span>
                <span th:text="${sourceLangName}">Français</span>
            </p>
            <p class="text-sm text-base-content/80 leading-relaxed" th:text="${originalText}">Source text</p>
        </div>
    </div>

    <!-- Translated bubble: right-aligned, border + label colored by targetLang.
         B4: language is conveyed via TEXT (code + localized name) and ARIA label,
         not just border color. -->
    <div class="flex justify-end mb-4"
         th:with="targetLangName=#{|lang.code.${targetLang}|},sourceLangName=#{|lang.code.${sourceLang}|}">
        <div class="max-w-[85%] sm:max-w-[70%] rounded-lg rounded-tr-none px-4 py-3 bg-base-200 border-r-4 shadow-sm"
             th:classappend="${targetLang == 'fr' ? 'border-primary' : 'border-accent'}"
             role="group"
             th:aria-label="#{aria.bubble.target(${targetLangName})}">
            <p class="text-xs font-medium mb-1 tracking-wide"
               th:classappend="${targetLang == 'fr' ? 'text-primary/70' : 'text-accent/70'}">
                <span class="uppercase" th:text="${targetLang}">rw</span>
                <span aria-hidden="true"> · </span>
                <span th:text="${targetLangName}">Ikinyarwanda</span>
            </p>
            <p class="text-base font-medium text-base-content leading-relaxed mb-3"
               th:text="${translatedText}">Translated text</p>

            <!-- Audio player (hidden, auto-played by Alpine). The src synthesises lazily on fetch
                 (GET /api/v1/audio/speak.mp3) so the text shows immediately and audio follows. -->
            <audio th:if="${translatedText != null and !#strings.isEmpty(translatedText)}"
                   th:id="|audio-${translationId}|"
                   th:src="@{/api/v1/audio/speak.mp3(lang=${targetLang},text=${translatedText})}"
                   preload="none"
                   x-init="$el.addEventListener('play', () => playing = true);
                            $el.addEventListener('ended', () => { playing = false; $dispatch('audio-ended'); });
                            $el.addEventListener('pause', () => playing = false);
                            $el.play().catch(() => {});"
                   class="sr-only"
                   th:aria-label="#{action.replay}">
            </audio>

            <!-- Back-translation audio (hidden, on demand): translate the target text back into the
                 source language and speak it, so the user can hear the meaning in the other language. -->
            <audio th:if="${translatedText != null and !#strings.isEmpty(translatedText)}"
                   th:id="|audio-back-${translationId}|"
                   th:src="@{/api/v1/audio/translate-speak.mp3(text=${translatedText},from=${targetLang},to=${sourceLang})}"
                   preload="none"
                   class="sr-only"
                   th:aria-label="#{action.listenIn(${sourceLangName})}">
            </audio>

            <!-- Bubble action row: replay + listen-in-other-language + copy + feedback.
                 flex-wrap so the controls never overflow the bubble on narrow phones. -->
            <div class="flex flex-wrap items-center gap-x-2 gap-y-1 pt-1 border-t border-base-300/50">

                <!-- Replay button (shown whenever there is text to speak) -->
                <button th:if="${translatedText != null and !#strings.isEmpty(translatedText)}"
                        type="button"
                        th:aria-label="#{action.replay}"
                        th:data-audio-target="|audio-${translationId}|"
                        class="btn btn-ghost btn-xs gap-1 text-base-content/60
                               hover:text-accent transition-colors duration-150"
                        :class="playing ? 'text-accent' : ''"
                        @click="$dispatch('pause-recognition');
                                const a = document.getElementById($el.dataset.audioTarget);
                                if (a) { a.currentTime = 0; a.play(); }">
                    <!-- Speaker / play SVG icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/>
                    </svg>
                    <span class="text-xs" th:text="#{action.replay}">Rejouer</span>
                </button>

                <!-- Listen in the other language: plays the back-translation audio -->
                <button th:if="${translatedText != null and !#strings.isEmpty(translatedText)}"
                        type="button"
                        th:aria-label="#{action.listenIn(${sourceLangName})}"
                        th:data-audio-target="|audio-back-${translationId}|"
                        class="btn btn-ghost btn-xs gap-1 text-base-content/60
                               hover:text-accent transition-colors duration-150"
                        @click="$dispatch('pause-recognition');
                                const a = document.getElementById($el.dataset.audioTarget);
                                if (a) { a.currentTime = 0; a.play(); }">
                    <!-- Translate / language SVG icon (distinct from the plain replay speaker) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="m10.5 21 5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 0 1 6-.371m0 0c1.12 0 2.233.038 3.334.114M9 5.25V3m3.334 2.364C11.176 10.658 7.69 15.08 3 17.502m9.334-12.138c.896.061 1.785.147 2.666.257m-4.589 8.495a18.023 18.023 0 0 1-3.827-5.802"/>
                    </svg>
                    <span class="text-xs" th:text="#{action.listenIn(${sourceLangName})}">Écouter en français</span>
                </button>

                <!-- Copy button (shown whenever there is translated text to copy) -->
                <button th:if="${translatedText != null and !#strings.isEmpty(translatedText)}"
                        type="button"
                        x-data="{ copied: false }"
                        th:aria-label="#{action.copy}"
                        th:data-text="${translatedText}"
                        th:attr="data-label-copy=#{action.copy},data-label-copied=#{action.copied}"
                        class="btn btn-ghost btn-xs gap-1 text-base-content/60
                               hover:text-accent transition-colors duration-150"
                        :class="copied ? 'text-success' : ''"
                        @click="navigator.clipboard.writeText($el.dataset.text);
                                copied = true;
                                setTimeout(() => copied = false, 1500)">
                    <!-- Clipboard / duplicate SVG icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75h-6a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/>
                    </svg>
                    <span class="text-xs"
                          x-text="copied ? $el.parentElement.dataset.labelCopied : $el.parentElement.dataset.labelCopy"
                          th:text="#{action.copy}">Copier</span>
                </button>

                <!-- Feedback buttons -->
                <div th:replace="~{fragments/feedback :: buttons(${translationId}, ${sessionId})}"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
