<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{auth.login.title}">Connexion</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="flex justify-center items-center min-h-[70vh]">
            <div class="card w-96 bg-base-100 shadow-xl">
                <div class="card-body">
                    <h2 class="card-title text-center justify-center text-2xl mb-4" th:text="#{auth.login.title}">Connexion</h2>

                    <div th:if="${error}" class="alert alert-error text-sm mb-2" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success text-sm mb-2" th:text="${success}"></div>
                    <div th:if="${info}" class="alert alert-info text-sm mb-2" th:text="${info}"></div>

                    <!-- Google OAuth (rendered only when GOOGLE_CLIENT_ID is set) -->
                    <a th:if="${googleOAuthEnabled}" th:href="@{/oauth2/authorization/google}"
                       class="btn btn-outline w-full gap-2 normal-case">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 48 48" aria-hidden="true">
                            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35.5 24 35.5c-6.4 0-11.5-5.1-11.5-11.5S17.6 12.5 24 12.5c2.9 0 5.6 1.1 7.7 2.9l5.7-5.7C33.9 6.3 29.2 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.4-.4-3.5z"/>
                            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12.5 24 12.5c2.9 0 5.6 1.1 7.7 2.9l5.7-5.7C33.9 6.3 29.2 4.5 24 4.5 16.3 4.5 9.6 8.9 6.3 14.7z"/>
                            <path fill="#4CAF50" d="M24 43.5c5.1 0 9.8-1.8 13.5-4.9l-6.2-5.1C29.3 35 26.8 35.5 24 35.5c-5.3 0-9.7-3-11.3-7.4l-6.5 5C9.6 39.1 16.3 43.5 24 43.5z"/>
                            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.5l6.2 5.1c-.4.4 6.7-4.9 6.7-14.6 0-1.2-.1-2.4-.4-3.5z"/>
                        </svg>
                        <span th:text="#{auth.login.oauth.google}">Continue with Google</span>
                    </a>

                    <div th:if="${googleOAuthEnabled}" class="divider text-xs text-base-content/50"
                         th:text="#{auth.login.oauth.divider}">or</div>

                    <form th:action="@{/login}" method="post">
                        <div class="form-control w-full">
                            <label class="label">
                                <span class="label-text" th:text="#{auth.login.email}">Email</span>
                            </label>
                            <input type="email" name="email" class="input input-bordered w-full"
                                   th:placeholder="#{auth.login.email}" required autofocus />
                        </div>

                        <div class="form-control w-full mt-4">
                            <label class="label">
                                <span class="label-text" th:text="#{auth.login.password}">Mot de passe</span>
                                <a th:href="@{/forgot-password}" class="label-text-alt link link-hover text-primary" th:text="#{auth.forgot.password.title}">
                                    Mot de passe oublié ?
                                </a>
                            </label>
                            <input type="password" name="password" class="input input-bordered w-full"
                                   th:placeholder="#{auth.login.password}" required />
                        </div>

                        <div class="form-control mt-6">
                            <button type="submit" class="btn btn-primary" th:text="#{auth.login.submit}">Se connecter</button>
                        </div>
                    </form>

                    <div class="divider"></div>

                    <p class="text-center text-sm">
                        <a th:href="@{/register}" class="link link-primary" th:text="#{auth.login.register.link}">
                            Pas encore de compte ? S'inscrire
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
