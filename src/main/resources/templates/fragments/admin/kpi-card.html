<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="kpiCard(label, value, delta, deltaPositive)"
     class="bg-base-100 border border-base-200 rounded-xl p-6 hover:shadow-md transition-shadow">
    <p class="text-xs uppercase tracking-wider text-base-content/60 font-medium" th:text="${label}"></p>
    <p class="mt-2 text-4xl font-semibold font-mono tabular-nums tracking-tight" th:text="${value}"></p>
    <div th:if="${delta != null}" class="mt-3 flex items-center gap-2 text-sm">
        <span th:class="${deltaPositive} ? 'text-success font-medium' : 'text-error font-medium'"
              th:text="${(deltaPositive ? '↗ ' : '↘ ') + delta + '%'}"></span>
        <span class="text-base-content/50" th:text="#{admin.kpi.vs.last.month}">vs last month</span>
    </div>
</div>
</body>
</html>
