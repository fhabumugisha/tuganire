<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="#{admin.users.title}">Users</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Page header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-bold text-base-content" th:text="#{admin.users.title}">Users</h1>
            <span class="badge badge-neutral font-mono tabular-nums" th:text="${users.totalElements}">0</span>
        </div>
    </div>

    <!-- Search toolbar -->
    <form th:action="@{/admin/users}" method="get" class="mb-6">
        <div class="flex gap-3 flex-wrap">
            <div class="relative flex-1 min-w-64">
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-base-content/40 pointer-events-none"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" name="q"
                       th:value="${search}"
                       th:placeholder="#{admin.users.search.placeholder}"
                       class="input input-bordered input-sm pl-10 w-full"/>
            </div>
            <button type="submit" class="btn btn-primary btn-sm">Search</button>
            <a th:href="@{/admin/users}" class="btn btn-ghost btn-sm" th:if="${search != null and !search.isEmpty()}">Clear</a>
        </div>
    </form>

    <!-- Table -->
    <div class="bg-base-100 border border-base-200 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="table table-sm w-full">
                <thead class="bg-base-200/50">
                <tr class="text-xs uppercase text-base-content/50">
                    <th class="w-8 font-medium">ID</th>
                    <th class="font-medium" th:text="#{admin.users.col.email}">Email</th>
                    <th class="font-medium">Name</th>
                    <th class="font-medium" th:text="#{admin.users.col.plan}">Plan</th>
                    <th class="font-medium" th:text="#{admin.users.col.signup}">Signup</th>
                    <th class="font-medium text-right" th:text="#{admin.users.col.cost}">LLM Cost</th>
                    <th class="font-medium">Admin</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users.content}"
                    class="hover:bg-base-200/30 transition-colors">
                    <td class="font-mono tabular-nums text-xs text-base-content/40" th:text="${user.id}"></td>
                    <td>
                        <a th:href="@{/admin/users/{id}(id=${user.id})}"
                           class="text-primary hover:underline font-medium text-sm" th:text="${user.email}"></a>
                    </td>
                    <td class="text-sm text-base-content/80" th:text="${user.fullName ?: '—'}"></td>
                    <td>
                        <span th:if="${user.plan.name() == 'PREMIUM'}" class="badge badge-primary badge-sm">Premium</span>
                        <span th:if="${user.plan.name() == 'FREE'}" class="badge badge-ghost badge-sm">Free</span>
                    </td>
                    <td class="text-xs text-base-content/60"
                        th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd MMM yyyy') : '—'}"></td>
                    <td class="text-right font-mono tabular-nums text-sm">
                        $<span th:text="${user.totalLlmCost != null ? #numbers.formatDecimal(user.totalLlmCost, 1, 4) : '0.0000'}"></span>
                    </td>
                    <td>
                        <span th:if="${user.admin}" class="badge badge-warning badge-sm">Admin</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/users/{id}(id=${user.id})}"
                           class="btn btn-ghost btn-xs">View</a>
                    </td>
                </tr>
                <tr th:if="${users.isEmpty()}">
                    <td colspan="8" class="text-center py-12 text-base-content/40">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <p>No users found</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${users.totalPages > 1}"
             class="flex items-center justify-between px-4 py-3 border-t border-base-200">
            <p class="text-xs text-base-content/50">
                Showing
                <span class="font-medium" th:text="${users.number * users.size + 1}"></span>
                –
                <span class="font-medium" th:text="${users.number * users.size + users.numberOfElements}"></span>
                of
                <span class="font-medium" th:text="${users.totalElements}"></span>
            </p>
            <div class="join">
                <a th:href="@{/admin/users(q=${search}, page=${users.number - 1})}"
                   th:classappend="${!users.hasPreviousPage()} ? 'btn-disabled'"
                   class="join-item btn btn-sm">«</a>
                <th:block th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}">
                    <a th:if="${i >= users.number - 2 and i <= users.number + 2}"
                       th:href="@{/admin/users(q=${search}, page=${i})}"
                       class="join-item btn btn-sm"
                       th:classappend="${i == users.number} ? 'btn-active'"
                       th:text="${i + 1}"></a>
                </th:block>
                <a th:href="@{/admin/users(q=${search}, page=${users.number + 1})}"
                   th:classappend="${!users.hasNextPage()} ? 'btn-disabled'"
                   class="join-item btn btn-sm">»</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
