<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
    Breadcrumbs fragment.
    Usage:
      <nav th:replace="~{fragments/breadcrumbs :: breadcrumbs(items=${breadcrumbs})}"></nav>
    Where items is a List of {label, url}. Last item is rendered as current (no link).
-->
<nav th:fragment="breadcrumbs(items)"
     class="flex items-center text-sm text-base-content/60"
     aria-label="Breadcrumb">
    <ol class="flex items-center flex-wrap gap-1.5">
        <li th:each="item, iter : ${items}" class="flex items-center gap-1.5">
            <a th:if="${!iter.last and item.url != null}"
               th:href="${item.url}"
               th:text="${item.label}"
               class="hover:text-base-content transition-colors">Home</a>
            <span th:if="${iter.last or item.url == null}"
                  th:text="${item.label}"
                  class="text-base-content font-medium"
                  aria-current="page">Current</span>
            <svg th:if="${!iter.last}" class="w-4 h-4 text-base-content/30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
            </svg>
        </li>
    </ol>
</nav>
</body>
</html>
