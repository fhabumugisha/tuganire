<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE" th:text="#{app.title}">Tuganire</title>

    <!-- CSRF tokens for HTMX programmatic posts -->
    <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}"/>

    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <!-- HTMX -->
    <script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
    <!-- Alpine.js -->
    <script th:src="@{/webjars/alpinejs/dist/cdn.min.js}" defer></script>

    <th:block layout:fragment="stylesheets"></th:block>
</head>
<body class="bg-base-100 text-base-content min-h-dvh flex flex-col">

    <!-- Skip to main content (accessibility) -->
    <a class="skip-link" th:href="@{#main-content}" th:text="#{nav.skipToContent}">Aller au contenu principal</a>

    <!-- Top navigation bar -->
    <header class="sticky top-0 z-30 bg-base-100 border-b border-base-300
                   pt-[env(safe-area-inset-top)]">
        <nav class="flex items-center justify-between h-14 px-3 sm:px-4 max-w-2xl mx-auto w-full"
             th:aria-label="#{aria.mainNav}">

            <!-- App title -->
            <a th:href="@{/}" class="font-display text-xl font-medium text-primary tracking-tight
                                     hover:opacity-80 transition-opacity duration-150 focus-visible:outline-none
                                     focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 rounded-sm"
               th:text="#{app.title}">Tuganire</a>

            <!-- Top-right actions -->
            <div class="flex items-center gap-0.5 sm:gap-1">

                <!-- Language switcher -->
                <div class="dropdown dropdown-end">
                    <button tabindex="0" role="button"
                            class="btn btn-ghost btn-sm gap-1 px-2 min-h-11 text-base-content/70 hover:text-primary
                                   focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
                            th:aria-label="#{settings.language}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                        </svg>
                        <span class="text-xs font-semibold" th:text="${#locale.language.toUpperCase()}">FR</span>
                    </button>
                    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-40 w-32 p-1
                                           shadow-lg border border-base-300 mt-1">
                        <li>
                            <a th:href="@{/(lang=fr)}" class="text-sm" hreflang="fr"
                               th:text="#{lang.fr}">Français</a>
                        </li>
                        <li>
                            <a th:href="@{/(lang=en)}" class="text-sm" hreflang="en"
                               th:text="#{lang.en}">English</a>
                        </li>
                    </ul>
                </div>

                <!-- Microphone / status icon -->
                <a th:href="@{/}" class="btn btn-ghost btn-sm btn-circle min-h-11 w-11 text-base-content/60
                                         hover:text-primary transition-colors duration-150
                                         focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
                   th:aria-label="#{nav.mic}">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                    </svg>
                </a>

                <!-- Stats / admin link -->
                <a th:href="@{/admin}" class="btn btn-ghost btn-sm btn-circle min-h-11 w-11 text-base-content/60
                                              hover:text-primary transition-colors duration-150
                                              focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
                   th:aria-label="#{nav.stats}">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/>
                    </svg>
                </a>

                <!-- Settings icon -->
                <a th:href="@{/settings}" class="btn btn-ghost btn-sm btn-circle min-h-11 w-11 text-base-content/60
                                                  hover:text-primary transition-colors duration-150
                                                  focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
                   th:aria-label="#{nav.settings}">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <!-- Main content -->
    <main id="main-content" class="flex-1 flex flex-col">
        <div layout:fragment="content"></div>
    </main>

    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
