<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- RATE LIMIT DISPLAY FRAGMENT - Full Card Version -->
<div th:fragment="rate-limit-display" class="rate-limit-container">
    <!-- Warning when limit reached -->
    <div th:if="${!canMakeRequest}" class="mx-4 mt-4 p-3 rounded-xl bg-error/10 border border-error/20">
        <div class="flex items-center gap-3">
            <div class="text-error">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <div class="flex-1">
                <p class="font-medium text-sm text-base-content" th:text="#{rate.limit.exceeded}">Limite atteinte</p>
                <p class="text-xs text-base-content/60">
                    <span th:text="#{rate.limit.reset.at}">Reinitialisation a</span>
                    <span th:text="${nextResetTime}">14:30</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Usage counter when not at limit -->
    <div th:if="${canMakeRequest}" class="mx-4 mt-4 p-2 rounded-lg bg-base-200/50">
        <div class="flex items-center justify-between text-xs">
            <span class="text-base-content/60" th:text="#{rate.limit.remaining}">Requetes restantes</span>
            <span class="font-medium"><span th:text="${remainingRequests}">3</span>/<span th:text="${maxRequests}">5</span></span>
        </div>
        <div class="w-full bg-base-300 rounded-full h-1.5 mt-2">
            <div class="h-1.5 rounded-full transition-all duration-300"
                 th:classappend="${remainingRequests > (maxRequests / 2)} ? 'bg-success' : (${remainingRequests > (maxRequests / 4)} ? 'bg-warning' : 'bg-error')"
                 th:style="'width: ' + ${(remainingRequests * 100) / maxRequests} + '%'"></div>
        </div>
        <p class="text-xs text-base-content/40 mt-1">
            <span th:text="#{rate.limit.reset.at}">Reinitialisation a</span>
            <span th:text="${nextResetTime}">14:30</span>
        </p>
    </div>
</div>

<!-- COMPACT BADGE VERSION -->
<span th:fragment="rate-limit-badge" class="badge gap-1" th:classappend="${canMakeRequest} ? 'badge-outline' : 'badge-error'">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span th:text="${remainingRequests} + '/' + ${maxRequests}">3/5</span>
</span>

<!-- INLINE ALERT VERSION - For use in forms/modals -->
<div th:fragment="rate-limit-alert" th:if="${!canMakeRequest}" class="alert alert-warning shadow-lg mb-4" role="alert" aria-live="polite">
    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
    <div>
        <h3 class="font-bold" th:text="#{rate.limit.exceeded.title}">Limite de requetes atteinte</h3>
        <div class="text-xs">
            <span th:text="#{rate.limit.exceeded.message}">Vous avez atteint la limite de requetes.</span>
            <span th:text="#{rate.limit.reset.at}">Reinitialisation a</span>
            <span th:text="${nextResetTime}">14:30</span>
        </div>
    </div>
</div>

<!-- MINIMAL COUNTER - Just numbers -->
<span th:fragment="rate-limit-counter" class="text-xs text-base-content/60">
    <span th:text="${remainingRequests}">3</span>/<span th:text="${maxRequests}">5</span>
    <span th:text="#{rate.limit.remaining.short}">restantes</span>
</span>

<!-- ERROR FRAGMENT - For HTMX error responses (429 Too Many Requests) -->
<div th:fragment="error" class="alert alert-error shadow-lg" role="alert" aria-live="assertive">
    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <div>
        <h3 class="font-bold" th:text="#{rate.limit.error.title}">Trop de requêtes</h3>
        <div class="text-xs" th:text="${message}">Vous avez dépassé la limite de requêtes.</div>
    </div>
    <div class="flex-none">
        <button class="btn btn-sm btn-ghost" onclick="this.closest('.alert').remove()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
</div>

</body>
</html>
