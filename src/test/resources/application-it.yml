spring:
  main:
    banner-mode: off
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      # Intentionally unreachable — NoOpCacheConfig in AbstractIntegrationTest provides a @Primary no-op bean
      url: redis://localhost:16379
  ai:
    openai:
      api-key: test-key
    anthropic:
      api-key: test-key

tuganire:
  mms:
    base-url: http://localhost:8000
  cache:
    translation-ttl-days: 1
  rate-limit:
    requests-per-minute: 1000
    requests-per-day: 100000
  llm:
    default-provider: openai
    fallback-provider: anthropic
  tts:
    default-provider: openai
    kiny-provider: mms
    french-provider: openai
  stt:
    default-provider: whisper
  security:
    allowed-origins: http://localhost
