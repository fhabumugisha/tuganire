server:
  port: ${PORT:8080}

spring:
  thymeleaf:
    cache: true
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    hikari:
      # Neon pooled endpoint + Cloud Run scale-to-zero: keep the per-instance pool small
      # so concurrent instances don't exhaust the upstream connection limit.
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 1
      connection-timeout: 10000
  data:
    redis:
      url: ${REDIS_URL}
  jpa:
    show-sql: false

logging:
  level:
    com.tuganire: WARN
    org.springframework: WARN
