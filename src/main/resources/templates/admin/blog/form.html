<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="#{admin.blog.form.title}">Article</title>
    <th:block layout:fragment="head-extra">
        <link rel="stylesheet" th:href="@{/webjars/font-awesome/4.7.0/css/font-awesome.min.css}">
        <link rel="stylesheet" th:href="@{/webjars/easymde/2.18.0/dist/easymde.min.css}">
        <script th:src="@{/webjars/easymde/2.18.0/dist/easymde.min.js}" defer></script>
        <style>
            .EasyMDEContainer .editor-toolbar { border-color: oklch(var(--bc) / 0.2); border-top-left-radius: 0.375rem; border-top-right-radius: 0.375rem; }
            .EasyMDEContainer .CodeMirror { border-color: oklch(var(--bc) / 0.2); border-bottom-left-radius: 0.375rem; border-bottom-right-radius: 0.375rem; min-height: 240px; }
            .EasyMDEContainer .editor-toolbar button { color: oklch(var(--bc) / 0.7) !important; }
            .EasyMDEContainer .editor-toolbar button:hover,
            .EasyMDEContainer .editor-toolbar button.active { background: oklch(var(--bc) / 0.08); border-color: oklch(var(--bc) / 0.2); }
            .EasyMDEContainer .editor-preview,
            .EasyMDEContainer .editor-preview-side { background: oklch(var(--b1)); }

            /* Mobile: keep EasyMDE toolbar on a single row, scroll horizontally instead of wrapping */
            @media (max-width: 640px) {
                .EasyMDEContainer .editor-toolbar {
                    flex-wrap: nowrap;
                    overflow-x: auto;
                    overflow-y: hidden;
                    -webkit-overflow-scrolling: touch;
                    white-space: nowrap;
                    padding: 4px 6px;
                }
                .EasyMDEContainer .editor-toolbar::-webkit-scrollbar { height: 0; }
                .EasyMDEContainer .editor-toolbar button,
                .EasyMDEContainer .editor-toolbar i.separator {
                    flex: 0 0 auto;
                }
                .EasyMDEContainer .editor-toolbar button {
                    width: 30px;
                    height: 30px;
                    padding: 4px;
                }
                /* Hide low-priority buttons on mobile to reduce clutter */
                .EasyMDEContainer .editor-toolbar button.side-by-side,
                .EasyMDEContainer .editor-toolbar button.fullscreen,
                .EasyMDEContainer .editor-toolbar button.table,
                .EasyMDEContainer .editor-toolbar button.guide {
                    display: none;
                }
                .EasyMDEContainer .CodeMirror { font-size: 14px; }
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">

    <div class="max-w-7xl mx-auto"
         x-data="{
             title: '',
             slug: '',
             slugManuallyEdited: false,
             coverImageUrl: '',
             slugify(text) {
                 return text
                     .toLowerCase()
                     .normalize('NFD')
                     .replace(/[̀-ͯ]/g, '')
                     .replace(/[^a-z0-9]+/g, '-')
                     .replace(/^-+|-+$/g, '')
                     .substring(0, 80);
             },
             onTitleInput(val) {
                 this.title = val;
                 if (!this.slugManuallyEdited) {
                     this.slug = this.slugify(val);
                 }
             },
             onSlugInput(val) {
                 this.slug = val;
                 this.slugManuallyEdited = true;
             },
             onCoverInput(val) {
                 this.coverImageUrl = val;
             }
         }"
         x-init="
             title = $refs.titleInput ? $refs.titleInput.value : '';
             slug = $refs.slugInput ? $refs.slugInput.value : '';
             coverImageUrl = $refs.coverInput ? $refs.coverInput.value : '';
             slugManuallyEdited = slug !== '';
         ">

        <!-- Page Header -->
        <div class="flex items-center gap-2 sm:gap-4 mb-6 sm:mb-8">
            <a th:href="@{/admin/blog}" class="btn btn-ghost btn-sm rounded-lg gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                <span class="hidden sm:inline">Articles</span>
            </a>
            <h1 class="text-lg sm:text-2xl font-semibold tracking-tight text-base-content truncate"
                th:text="${isNew} ? #{admin.blog.new} : #{admin.blog.form.title}">Article</h1>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success rounded-xl mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span th:text="${successMessage}"></span>
        </div>

        <!-- Form -->
        <form th:if="${isNew}"
              th:action="@{/admin/blog}"
              th:object="${articleForm}"
              method="post"
              class="grid grid-cols-1 lg:grid-cols-12 gap-6">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Main Column -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Title -->
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.title}">Titre</span>
                    </label>
                    <input type="text"
                           th:field="*{title}"
                           x-ref="titleInput"
                           @input="onTitleInput($event.target.value)"
                           class="input input-bordered rounded-md w-full text-base sm:text-xl font-semibold"
                           th:classappend="${#fields.hasErrors('title')} ? 'input-error' : ''"
                           th:placeholder="#{admin.blog.form.title}"
                           autofocus/>
                    <p th:if="${#fields.hasErrors('title')}" class="label-text-alt text-error mt-1" th:errors="*{title}"></p>
                </div>

                <!-- Slug -->
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.slug}">Slug</span>
                        <span class="label-text-alt text-base-content/50" th:text="#{common.optional}">Optionnel</span>
                    </label>
                    <div class="input input-bordered rounded-md flex items-center gap-2"
                         th:classappend="${#fields.hasErrors('slug')} ? 'input-error' : ''">
                        <span class="text-base-content/40 text-sm select-none shrink-0">/blog/</span>
                        <input type="text"
                               th:field="*{slug}"
                               x-ref="slugInput"
                               :value="slug"
                               @input="onSlugInput($event.target.value)"
                               class="grow bg-transparent outline-none font-mono text-sm"
                               th:placeholder="#{admin.blog.form.slug}"/>
                    </div>
                    <p th:if="${#fields.hasErrors('slug')}" class="label-text-alt text-error mt-1" th:errors="*{slug}"></p>
                </div>

                <!-- Content -->
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.content}">Contenu (Markdown)</span>
                    </label>
                    <textarea th:field="*{content}"
                              id="content-new"
                              data-easymde
                              class="textarea textarea-bordered rounded-md font-mono text-sm w-full min-h-[240px] sm:min-h-[400px] resize-y"
                              th:classappend="${#fields.hasErrors('content')} ? 'textarea-error' : ''"
                              th:placeholder="#{admin.blog.form.content}"></textarea>
                    <p th:if="${#fields.hasErrors('content')}" class="label-text-alt text-error mt-1" th:errors="*{content}"></p>
                </div>
            </div>

            <!-- Side Column -->
            <div class="lg:col-span-4 space-y-6">

                <!-- Publish Toggle -->
                <div class="bg-base-100 border border-base-200 rounded-xl p-5">
                    <h3 class="font-medium text-base-content mb-4" th:text="#{admin.blog.form.publish}">Publication</h3>
                    <div class="flex items-center justify-between">
                        <label class="label cursor-pointer gap-3 p-0">
                            <input type="checkbox" th:field="*{published}" class="toggle toggle-primary"/>
                            <span class="label-text" th:text="#{admin.blog.status.published}">Publié</span>
                        </label>
                    </div>
                </div>

                <!-- Excerpt -->
                <div class="form-control"
                     x-data="{ loading: false, error: '' }">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.excerpt}">Extrait</span>
                        <span class="label-text-alt text-base-content/50" th:text="#{common.optional}">Optionnel</span>
                    </label>
                    <textarea th:field="*{excerpt}"
                              id="excerpt-new"
                              rows="3"
                              class="textarea textarea-bordered rounded-md text-sm w-full"
                              th:placeholder="#{admin.blog.form.excerpt}"></textarea>
                    <button type="button"
                            class="btn btn-sm btn-outline btn-primary rounded-md mt-2 w-full gap-2"
                            :disabled="loading"
                            @click="
                                error = '';
                                const titleEl = document.querySelector('input[name=&quot;title&quot;]');
                                const contentEl = document.querySelector('#content-new');
                                const title = titleEl ? titleEl.value : '';
                                const content = (window.easyMDEContentNew ? window.easyMDEContentNew.value() : (contentEl ? contentEl.value : ''));
                                if (!title.trim() || !content.trim()) { error = $el.dataset.errEmpty; return; }
                                loading = true;
                                const fd = new FormData();
                                fd.append('title', title);
                                fd.append('content', content);
                                const csrf = document.querySelector('meta[name=&quot;_csrf&quot;]');
                                const csrfHeader = document.querySelector('meta[name=&quot;_csrf_header&quot;]');
                                const headers = {};
                                if (csrf && csrfHeader) headers[csrfHeader.content] = csrf.content;
                                fetch('/admin/blog/ai/generate-excerpt', { method: 'POST', body: fd, headers })
                                    .then(r => r.text().then(t => ({ ok: r.ok, text: t })))
                                    .then(({ ok, text }) => { if (ok) { document.querySelector('#excerpt-new').value = text; } else { error = text; } })
                                    .catch(e => { error = e.message; })
                                    .finally(() => { loading = false; });
                            "
                            th:data-err-empty="#{admin.blog.ai.error.empty}">
                        <span class="loading loading-spinner loading-xs" x-show="loading" style="display:none;"></span>
                        <svg x-show="!loading" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        <span th:text="#{admin.blog.ai.generate.excerpt}">Générer l'extrait</span>
                    </button>
                    <p x-show="error" x-text="error" class="label-text-alt text-error mt-1" style="display:none;"></p>
                </div>

                <!-- Cover Image URL -->
                <div class="form-control"
                     x-data="{ loading: false, error: '' }">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.cover}">Image de couverture</span>
                        <span class="label-text-alt text-base-content/50" th:text="#{common.optional}">Optionnel</span>
                    </label>
                    <input type="text"
                           th:field="*{coverImageUrl}"
                           id="cover-new"
                           x-ref="coverInput"
                           @input="onCoverInput($event.target.value)"
                           class="input input-bordered rounded-md text-sm w-full"
                           th:placeholder="#{admin.blog.form.cover}"/>
                    <!-- Preview Thumbnail -->
                    <div x-show="coverImageUrl" class="mt-2 rounded-lg overflow-hidden border border-base-200" style="display:none;">
                        <img :src="coverImageUrl" alt="Aperçu" class="w-full h-24 object-cover"/>
                    </div>
                    <button type="button"
                            class="btn btn-sm btn-outline btn-primary rounded-md mt-2 w-full gap-2"
                            :disabled="loading"
                            @click="
                                error = '';
                                const titleEl = document.querySelector('input[name=&quot;title&quot;]');
                                const excerptEl = document.querySelector('#excerpt-new');
                                const title = titleEl ? titleEl.value : '';
                                const excerpt = excerptEl ? excerptEl.value : '';
                                if (!title.trim()) { error = $el.dataset.errEmpty; return; }
                                loading = true;
                                const fd = new FormData();
                                fd.append('title', title);
                                fd.append('excerpt', excerpt);
                                const csrf = document.querySelector('meta[name=&quot;_csrf&quot;]');
                                const csrfHeader = document.querySelector('meta[name=&quot;_csrf_header&quot;]');
                                const headers = {};
                                if (csrf && csrfHeader) headers[csrfHeader.content] = csrf.content;
                                fetch('/admin/blog/ai/generate-cover', { method: 'POST', body: fd, headers })
                                    .then(r => r.text().then(t => ({ ok: r.ok, text: t })))
                                    .then(({ ok, text }) => { if (ok) { const el = document.querySelector('#cover-new'); el.value = text; el.dispatchEvent(new Event('input')); } else { error = text; } })
                                    .catch(e => { error = e.message; })
                                    .finally(() => { loading = false; });
                            "
                            th:data-err-empty="#{admin.blog.ai.error.empty.title}">
                        <span class="loading loading-spinner loading-xs" x-show="loading" style="display:none;"></span>
                        <svg x-show="!loading" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <span th:text="#{admin.blog.ai.generate.cover}">Générer l'image</span>
                    </button>
                    <p x-show="error" x-text="error" class="label-text-alt text-error mt-1" style="display:none;"></p>
                </div>

                <!-- Actions -->
                <div class="flex flex-col gap-2 pt-2">
                    <button type="submit" class="btn btn-primary rounded-lg w-full" th:text="#{common.save}">Sauvegarder</button>
                    <a th:href="@{/admin/blog}" class="btn btn-ghost rounded-lg w-full" th:text="#{common.cancel}">Annuler</a>
                </div>

            </div>
        </form>

        <!-- Edit Form -->
        <form th:unless="${isNew}"
              th:action="@{/admin/blog/{id}(id=${article.id})}"
              th:object="${articleForm}"
              method="post"
              class="grid grid-cols-1 lg:grid-cols-12 gap-6">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Main Column -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Title -->
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.title}">Titre</span>
                    </label>
                    <input type="text"
                           th:field="*{title}"
                           x-ref="titleInput"
                           @input="onTitleInput($event.target.value)"
                           class="input input-bordered rounded-md w-full text-base sm:text-xl font-semibold"
                           th:classappend="${#fields.hasErrors('title')} ? 'input-error' : ''"
                           th:placeholder="#{admin.blog.form.title}"/>
                    <p th:if="${#fields.hasErrors('title')}" class="label-text-alt text-error mt-1" th:errors="*{title}"></p>
                </div>

                <!-- Slug -->
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.slug}">Slug</span>
                        <span class="label-text-alt text-base-content/50" th:text="#{common.optional}">Optionnel</span>
                    </label>
                    <div class="input input-bordered rounded-md flex items-center gap-2"
                         th:classappend="${#fields.hasErrors('slug')} ? 'input-error' : ''">
                        <span class="text-base-content/40 text-sm select-none shrink-0">/blog/</span>
                        <input type="text"
                               th:field="*{slug}"
                               x-ref="slugInput"
                               :value="slug"
                               @input="onSlugInput($event.target.value)"
                               class="grow bg-transparent outline-none font-mono text-sm"
                               th:placeholder="#{admin.blog.form.slug}"/>
                    </div>
                    <p th:if="${#fields.hasErrors('slug')}" class="label-text-alt text-error mt-1" th:errors="*{slug}"></p>
                </div>

                <!-- Content -->
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.content}">Contenu (Markdown)</span>
                    </label>
                    <textarea th:field="*{content}"
                              id="content-edit"
                              data-easymde
                              class="textarea textarea-bordered rounded-md font-mono text-sm w-full min-h-[240px] sm:min-h-[400px] resize-y"
                              th:classappend="${#fields.hasErrors('content')} ? 'textarea-error' : ''"
                              th:placeholder="#{admin.blog.form.content}"></textarea>
                    <p th:if="${#fields.hasErrors('content')}" class="label-text-alt text-error mt-1" th:errors="*{content}"></p>
                </div>
            </div>

            <!-- Side Column -->
            <div class="lg:col-span-4 space-y-6">

                <!-- Publish Toggle -->
                <div class="bg-base-100 border border-base-200 rounded-xl p-5">
                    <h3 class="font-medium text-base-content mb-4" th:text="#{admin.blog.form.publish}">Publication</h3>
                    <div class="flex items-center justify-between">
                        <label class="label cursor-pointer gap-3 p-0">
                            <input type="checkbox" th:field="*{published}" class="toggle toggle-primary"/>
                            <span class="label-text" th:text="#{admin.blog.status.published}">Publié</span>
                        </label>
                    </div>
                    <div th:if="${article != null and article.publishedAt != null}" class="mt-3 text-xs text-base-content/50">
                        Publié le <span th:text="${#temporals.format(article.publishedAt, 'd MMM yyyy')}"></span>
                    </div>
                </div>

                <!-- Author (readonly) -->
                <div th:if="${article != null and article.author != null}" class="bg-base-100 border border-base-200 rounded-xl p-5">
                    <p class="text-xs font-medium text-base-content/50 uppercase tracking-wide mb-2">Auteur</p>
                    <span class="badge badge-ghost"
                          th:text="${article.author.firstName + ' ' + article.author.lastName}"></span>
                </div>

                <!-- Excerpt -->
                <div class="form-control"
                     x-data="{ loading: false, error: '' }">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.excerpt}">Extrait</span>
                        <span class="label-text-alt text-base-content/50" th:text="#{common.optional}">Optionnel</span>
                    </label>
                    <textarea th:field="*{excerpt}"
                              id="excerpt-edit"
                              rows="3"
                              class="textarea textarea-bordered rounded-md text-sm w-full"
                              th:placeholder="#{admin.blog.form.excerpt}"></textarea>
                    <button type="button"
                            class="btn btn-sm btn-outline btn-primary rounded-md mt-2 w-full gap-2"
                            :disabled="loading"
                            @click="
                                error = '';
                                const titleEl = document.querySelector('input[name=&quot;title&quot;]');
                                const contentEl = document.querySelector('#content-edit');
                                const title = titleEl ? titleEl.value : '';
                                const content = (window.easyMDEContentEdit ? window.easyMDEContentEdit.value() : (contentEl ? contentEl.value : ''));
                                if (!title.trim() || !content.trim()) { error = $el.dataset.errEmpty; return; }
                                loading = true;
                                const fd = new FormData();
                                fd.append('title', title);
                                fd.append('content', content);
                                const csrf = document.querySelector('meta[name=&quot;_csrf&quot;]');
                                const csrfHeader = document.querySelector('meta[name=&quot;_csrf_header&quot;]');
                                const headers = {};
                                if (csrf && csrfHeader) headers[csrfHeader.content] = csrf.content;
                                fetch('/admin/blog/ai/generate-excerpt', { method: 'POST', body: fd, headers })
                                    .then(r => r.text().then(t => ({ ok: r.ok, text: t })))
                                    .then(({ ok, text }) => { if (ok) { document.querySelector('#excerpt-edit').value = text; } else { error = text; } })
                                    .catch(e => { error = e.message; })
                                    .finally(() => { loading = false; });
                            "
                            th:data-err-empty="#{admin.blog.ai.error.empty}">
                        <span class="loading loading-spinner loading-xs" x-show="loading" style="display:none;"></span>
                        <svg x-show="!loading" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        <span th:text="#{admin.blog.ai.generate.excerpt}">Générer l'extrait</span>
                    </button>
                    <p x-show="error" x-text="error" class="label-text-alt text-error mt-1" style="display:none;"></p>
                </div>

                <!-- Cover Image URL -->
                <div class="form-control"
                     x-data="{ loading: false, error: '' }">
                    <label class="label pb-1">
                        <span class="label-text font-medium" th:text="#{admin.blog.form.cover}">Image de couverture</span>
                        <span class="label-text-alt text-base-content/50" th:text="#{common.optional}">Optionnel</span>
                    </label>
                    <input type="text"
                           th:field="*{coverImageUrl}"
                           id="cover-edit"
                           x-ref="coverInput"
                           @input="onCoverInput($event.target.value)"
                           class="input input-bordered rounded-md text-sm w-full"
                           th:placeholder="#{admin.blog.form.cover}"/>
                    <div x-show="coverImageUrl" class="mt-2 rounded-lg overflow-hidden border border-base-200" style="display:none;">
                        <img :src="coverImageUrl" alt="Aperçu" class="w-full h-24 object-cover"/>
                    </div>
                    <button type="button"
                            class="btn btn-sm btn-outline btn-primary rounded-md mt-2 w-full gap-2"
                            :disabled="loading"
                            @click="
                                error = '';
                                const titleEl = document.querySelector('input[name=&quot;title&quot;]');
                                const excerptEl = document.querySelector('#excerpt-edit');
                                const title = titleEl ? titleEl.value : '';
                                const excerpt = excerptEl ? excerptEl.value : '';
                                if (!title.trim()) { error = $el.dataset.errEmpty; return; }
                                loading = true;
                                const fd = new FormData();
                                fd.append('title', title);
                                fd.append('excerpt', excerpt);
                                const csrf = document.querySelector('meta[name=&quot;_csrf&quot;]');
                                const csrfHeader = document.querySelector('meta[name=&quot;_csrf_header&quot;]');
                                const headers = {};
                                if (csrf && csrfHeader) headers[csrfHeader.content] = csrf.content;
                                fetch('/admin/blog/ai/generate-cover', { method: 'POST', body: fd, headers })
                                    .then(r => r.text().then(t => ({ ok: r.ok, text: t })))
                                    .then(({ ok, text }) => { if (ok) { const el = document.querySelector('#cover-edit'); el.value = text; el.dispatchEvent(new Event('input')); } else { error = text; } })
                                    .catch(e => { error = e.message; })
                                    .finally(() => { loading = false; });
                            "
                            th:data-err-empty="#{admin.blog.ai.error.empty.title}">
                        <span class="loading loading-spinner loading-xs" x-show="loading" style="display:none;"></span>
                        <svg x-show="!loading" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <span th:text="#{admin.blog.ai.generate.cover}">Générer l'image</span>
                    </button>
                    <p x-show="error" x-text="error" class="label-text-alt text-error mt-1" style="display:none;"></p>
                </div>

                <!-- Actions -->
                <div class="flex flex-col gap-2 pt-2">
                    <button type="submit" class="btn btn-primary rounded-lg w-full" th:text="#{common.save}">Sauvegarder</button>
                    <a th:if="${article != null}"
                       th:href="@{/blog/{slug}(slug=${article.slug})}"
                       target="_blank"
                       class="btn btn-ghost rounded-lg w-full gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                        </svg>
                        Voir l'article
                    </a>
                    <a th:href="@{/admin/blog}" class="btn btn-ghost rounded-lg w-full" th:text="#{common.cancel}">Annuler</a>
                </div>

            </div>
        </form>

    </div>

    <script>
        (function initEasyMDE() {
            function init() {
                if (typeof EasyMDE === 'undefined') {
                    setTimeout(init, 50);
                    return;
                }
                document.querySelectorAll('textarea[data-easymde]').forEach(function (el) {
                    if (el.dataset.easymdeReady === '1') return;
                    var isMobile = window.matchMedia('(max-width: 640px)').matches;
                    var mde = new EasyMDE({
                        element: el,
                        autoDownloadFontAwesome: false,
                        spellChecker: false,
                        status: ['lines', 'words'],
                        minHeight: isMobile ? '240px' : '400px',
                        toolbar: ['bold', 'italic', 'heading', '|', 'quote', 'unordered-list', 'ordered-list', '|', 'link', 'image', 'code', 'table', '|', 'preview', 'side-by-side', 'fullscreen', '|', 'guide']
                    });
                    el.dataset.easymdeReady = '1';
                    if (el.id === 'content-new') window.easyMDEContentNew = mde;
                    if (el.id === 'content-edit') window.easyMDEContentEdit = mde;
                });
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

</div>
</body>
</html>
