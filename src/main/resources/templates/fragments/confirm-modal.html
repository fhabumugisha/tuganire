<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    Reusable Confirmation Modal Component
    Uses Alpine.js for state management and DaisyUI for styling

    Usage in parent template:
    1. Include the fragment: th:replace="~{fragments/confirm-modal :: confirmModal}"
    2. Add x-data="confirmModal()" to a parent element
    3. Trigger with: @click="showConfirm('Title', 'Message', () => yourAction())"

    Or use the helper attributes:
    - data-confirm-title="Title"
    - data-confirm-message="Message"
    - data-confirm-action="formId" (for form submission)
    - data-confirm-url="/api/endpoint" (for fetch POST)
-->

<!-- Confirmation Modal Fragment -->
<div th:fragment="confirmModal"
     x-show="isOpen"
     x-cloak
     x-transition:enter="ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 overflow-y-auto"
     aria-labelledby="modal-title"
     role="dialog"
     aria-modal="true">

    <!-- Backdrop -->
    <div class="fixed inset-0 bg-black/50 transition-opacity" @click="close()"></div>

    <!-- Modal Panel -->
    <div class="flex min-h-full items-center justify-center p-4">
        <div x-show="isOpen"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="relative transform overflow-hidden rounded-2xl bg-base-100 shadow-2xl transition-all w-full max-w-md"
             @click.away="close()">

            <!-- Header -->
            <div class="p-6 pb-4">
                <div class="flex items-center gap-4">
                    <!-- Icon based on type -->
                    <template x-if="type === 'danger'">
                        <div class="flex-shrink-0 w-12 h-12 rounded-full bg-error/10 flex items-center justify-center">
                            <svg class="w-6 h-6 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        </div>
                    </template>
                    <template x-if="type === 'warning'">
                        <div class="flex-shrink-0 w-12 h-12 rounded-full bg-warning/10 flex items-center justify-center">
                            <svg class="w-6 h-6 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                    </template>
                    <template x-if="type === 'info'">
                        <div class="flex-shrink-0 w-12 h-12 rounded-full bg-info/10 flex items-center justify-center">
                            <svg class="w-6 h-6 text-info" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                    </template>

                    <div>
                        <h3 class="text-lg font-semibold text-base-content" id="modal-title" x-text="title"></h3>
                        <p class="mt-1 text-sm text-base-content/70" x-text="message"></p>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="bg-base-200/50 px-6 py-4 flex justify-end gap-3">
                <button type="button"
                        class="btn btn-ghost"
                        @click="close()"
                        x-text="cancelText">
                </button>
                <button type="button"
                        class="btn"
                        :class="{
                            'btn-error': type === 'danger',
                            'btn-warning': type === 'warning',
                            'btn-primary': type === 'info'
                        }"
                        @click="confirm()"
                        x-text="confirmText">
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Alpine.js Component Script -->
<script th:fragment="confirmModalScript" th:inline="javascript">
    function confirmModal() {
        return {
            isOpen: false,
            title: '',
            message: '',
            type: 'danger',
            confirmText: /*[[#{action.confirm}]]*/ 'Confirm',
            cancelText: /*[[#{action.cancel}]]*/ 'Cancel',
            onConfirm: null,

            showConfirm(title, message, callback, options = {}) {
                this.title = title;
                this.message = message;
                this.onConfirm = callback;
                this.type = options.type || 'danger';
                this.confirmText = options.confirmText || /*[[#{action.confirm}]]*/ 'Confirm';
                this.cancelText = options.cancelText || /*[[#{action.cancel}]]*/ 'Cancel';
                this.isOpen = true;
            },

            confirm() {
                if (this.onConfirm && typeof this.onConfirm === 'function') {
                    this.onConfirm();
                }
                this.close();
            },

            close() {
                this.isOpen = false;
                this.onConfirm = null;
            }
        };
    }
</script>
</html>
