<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Erreur de validation</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card bg-base-100 shadow-xl max-w-2xl mx-auto">
        <div class="card-body">
            <div class="flex items-center gap-4 mb-4">
                <div th:replace="~{fragments/svg :: warning}" class="text-warning w-12 h-12"></div>
                <h2 class="card-title text-3xl">Erreur de validation</h2>
            </div>

            <div class="alert alert-error" th:if="${error}">
                <div th:replace="~{fragments/svg :: error}"></div>
                <span th:text="${error}">Erreur</span>
            </div>

            <div th:if="${errors}" class="mt-4">
                <h3 class="font-semibold mb-2">Erreurs détectées :</h3>
                <ul class="list-disc list-inside space-y-1">
                    <li th:each="err : ${errors}"
                        th:text="${err.defaultMessage}"
                        class="text-error"></li>
                </ul>
            </div>

            <div class="card-actions justify-end mt-6">
                <a href="javascript:history.back()" class="btn btn-primary">
                    <span th:replace="~{fragments/svg :: chevron-left}"></span>
                    Retour
                </a>
                <a href="/" class="btn btn-outline">
                    <span th:replace="~{fragments/svg :: home}"></span>
                    Accueil
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
