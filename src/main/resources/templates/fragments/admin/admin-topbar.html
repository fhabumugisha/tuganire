<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="topbar"
        class="sticky top-0 z-30 h-14 bg-base-100/90 backdrop-blur border-b border-base-200 flex items-center px-4 sm:px-6 gap-4">

    <!-- Mobile menu toggle (sidebar lives behind the drawer on small screens) -->
    <label for="admin-drawer" class="btn btn-ghost btn-sm lg:hidden -ml-2"
           aria-label="Open menu">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </label>

    <!-- Mobile-only compact logo (sidebar is hidden < lg) -->
    <a th:href="@{/admin}" class="lg:hidden flex items-center gap-2 text-base-content font-semibold text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
        </svg>
        <span>Tuganire</span>
    </a>

    <!-- Page title slot (filled by individual admin pages via th:block) -->
    <div class="hidden lg:flex items-center gap-2 text-sm text-base-content/60">
        <th:block th:if="${pageBreadcrumb != null}" th:text="${pageBreadcrumb}">Dashboard</th:block>
    </div>

    <div class="flex-1"></div>

    <!-- Right-side actions slot: pages can override with custom buttons; default empty -->
    <th:block th:if="${topbarActions != null}" th:utext="${topbarActions}"></th:block>
</header>
</body>
</html>
