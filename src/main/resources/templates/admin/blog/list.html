<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="#{admin.blog.list.title}">Articles</title>
</head>
<body>
<div layout:fragment="content">

    <div class="max-w-7xl mx-auto">

        <!-- Page Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-base-content"
                    th:text="#{admin.blog.list.title}">Articles</h1>
                <p class="mt-1 text-sm text-base-content/60"
                   th:text="${articles.totalElements + ' article(s) au total'}"></p>
            </div>
            <a th:href="@{/admin/blog/new}"
               class="btn btn-primary rounded-lg gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span th:text="#{admin.blog.new}">Nouvel article</span>
            </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success rounded-xl mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span th:text="${successMessage}"></span>
        </div>

        <!-- Articles Table -->
        <div th:if="${articles != null and articles.totalElements > 0}"
             class="bg-base-100 rounded-xl border border-base-200 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="table table-zebra w-full">
                    <thead>
                        <tr class="bg-base-200/50">
                            <th class="font-semibold text-base-content/70">Titre</th>
                            <th class="font-semibold text-base-content/70">Statut</th>
                            <th class="font-semibold text-base-content/70">Auteur</th>
                            <th class="font-semibold text-base-content/70">Modifié</th>
                            <th class="font-semibold text-base-content/70 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="article : ${articles.content}" class="hover">
                            <td>
                                <div class="font-medium text-base-content" th:text="${article.title}"></div>
                                <div class="text-xs text-base-content/50 font-mono mt-0.5" th:text="${article.slug}"></div>
                            </td>
                            <td>
                                <span th:if="${article.published}"
                                      class="badge badge-success badge-sm font-medium"
                                      th:text="#{admin.blog.status.published}">Publié</span>
                                <span th:unless="${article.published}"
                                      class="badge badge-warning badge-sm font-medium"
                                      th:text="#{admin.blog.status.draft}">Brouillon</span>
                            </td>
                            <td>
                                <span class="text-sm text-base-content/70"
                                      th:text="${article.author != null ? article.author.firstName + ' ' + article.author.lastName : '—'}"></span>
                            </td>
                            <td>
                                <span class="text-sm text-base-content/60"
                                      th:text="${article.updatedAt != null ? #temporals.format(article.updatedAt, 'd MMM yyyy') : '—'}"></span>
                            </td>
                            <td>
                                <div class="flex items-center justify-end gap-2">
                                    <!-- Edit -->
                                    <a th:href="@{/admin/blog/{id}/edit(id=${article.id})}"
                                       class="btn btn-ghost btn-xs rounded-md gap-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                        </svg>
                                        Éditer
                                    </a>

                                    <!-- Toggle Published -->
                                    <form th:action="@{/admin/blog/{id}/toggle-published(id=${article.id})}" method="post" class="inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-ghost btn-xs rounded-md gap-1"
                                                th:title="${article.published ? 'Dépublier' : 'Publier'}">
                                            <svg th:if="${article.published}" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                            </svg>
                                            <svg th:unless="${article.published}" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                            </svg>
                                            <span th:text="${article.published ? 'Dépublier' : 'Publier'}"></span>
                                        </button>
                                    </form>

                                    <!-- Delete -->
                                    <form th:action="@{/admin/blog/{id}/delete(id=${article.id})}" method="post" class="inline"
                                          onsubmit="return confirm('Supprimer cet article ?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-ghost btn-xs text-error rounded-md gap-1">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                            </svg>
                                            Supprimer
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${articles == null or articles.totalElements == 0}">
            <th:block th:replace="~{fragments/empty-state :: standard(
                'M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2 2 0 00-2-2h-2',
                #{admin.blog.empty.title},
                #{admin.blog.empty.description},
                #{admin.blog.new},
                @{/admin/blog/new}
            )}"/>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}" class="flex justify-center mt-8 gap-2">
            <a th:if="${currentPage > 0}"
               th:href="@{/admin/blog(page=${currentPage - 1})}"
               class="btn btn-outline btn-sm rounded-lg">← Précédent</a>
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:if="${i != currentPage}"
                   th:href="@{/admin/blog(page=${i})}"
                   th:text="${i + 1}"
                   class="btn btn-outline btn-sm rounded-lg"></a>
                <span th:if="${i == currentPage}"
                      th:text="${i + 1}"
                      class="btn btn-primary btn-sm rounded-lg pointer-events-none"></span>
            </span>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/admin/blog(page=${currentPage + 1})}"
               class="btn btn-outline btn-sm rounded-lg">Suivant →</a>
        </div>

    </div>

</div>
</body>
</html>
