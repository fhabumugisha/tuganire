<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{blog.title}">Blog</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Hero Section -->
    <section class="text-center py-16 sm:py-20 lg:py-24">
        <h1 class="text-4xl sm:text-5xl lg:text-7xl font-semibold tracking-tight text-base-content"
            th:text="#{blog.title}">Blog</h1>
        <p class="mt-4 text-lg text-base-content/60 max-w-2xl mx-auto"
           th:text="#{blog.subtitle}">Découvrez nos derniers articles</p>
    </section>

    <!-- Articles Grid -->
    <div th:if="${articles != null and articles.totalElements > 0}"
         class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <article th:each="article : ${articles.content}"
                     class="group block overflow-hidden rounded-xl bg-base-100 border border-base-200 hover:border-primary/30 hover:shadow-md transition-all duration-200">
                <a th:href="@{/blog/{slug}(slug=${article.slug})}" class="block">
                    <div class="aspect-[16/9] overflow-hidden bg-base-200">
                        <img th:if="${article.coverImageUrl != null and !#strings.isEmpty(article.coverImageUrl)}"
                             th:src="${article.coverImageUrl}"
                             th:alt="${article.title}"
                             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                             loading="lazy"/>
                        <div th:unless="${article.coverImageUrl != null and !#strings.isEmpty(article.coverImageUrl)}"
                             class="w-full h-full flex items-center justify-center bg-base-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-base-content/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="p-6">
                        <h2 class="text-xl font-semibold tracking-tight line-clamp-2 group-hover:text-primary transition-colors"
                            th:text="${article.title}"></h2>
                        <p class="mt-2 text-base-content/70 line-clamp-3" th:text="${article.excerpt}"></p>
                        <div class="mt-4 flex items-center gap-2 text-sm text-base-content/60">
                            <span th:if="${article.publishedAt != null}"
                                  th:text="${#temporals.format(article.publishedAt, 'd MMM yyyy')}"></span>
                            <span th:if="${article.publishedAt != null}">·</span>
                            <span th:text="${article.readingTimeMinutes + ' min'}"></span>
                        </div>
                    </div>
                </a>
            </article>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}" class="flex justify-center mt-12 gap-2">
            <a th:if="${currentPage > 0}"
               th:href="@{/blog(page=${currentPage - 1})}"
               class="btn btn-outline btn-sm rounded-lg">
                ← Précédent
            </a>
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:if="${i != currentPage}"
                   th:href="@{/blog(page=${i})}"
                   th:text="${i + 1}"
                   class="btn btn-outline btn-sm rounded-lg"></a>
                <span th:if="${i == currentPage}"
                      th:text="${i + 1}"
                      class="btn btn-primary btn-sm rounded-lg pointer-events-none"></span>
            </span>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/blog(page=${currentPage + 1})}"
               class="btn btn-outline btn-sm rounded-lg">
                Suivant →
            </a>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${articles == null or articles.totalElements == 0}"
         class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
        <th:block th:replace="~{fragments/empty-state :: standard(
            'M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2 2 0 00-2-2h-2',
            #{blog.empty.title},
            #{blog.empty.description},
            null,
            null
        )}"/>
    </div>

</div>
</body>
</html>
