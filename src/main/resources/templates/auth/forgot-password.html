<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{auth.forgot.password.title}">Mot de passe oublié</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="flex justify-center items-center min-h-[70vh]">
            <div class="card w-96 bg-base-100 shadow-xl">
                <div class="card-body">
                    <h2 class="card-title text-center justify-center text-2xl mb-2" th:text="#{auth.forgot.password.title}">Mot de passe oublié</h2>
                    <p class="text-sm text-center text-base-content/70 mb-4" th:text="#{auth.forgot.password.description}">
                        Entrez votre adresse email pour recevoir un lien de réinitialisation
                    </p>

                    <form th:action="@{/forgot-password}" method="post" th:object="${forgotPasswordRequest}">
                        <div class="form-control w-full">
                            <label class="label">
                                <span class="label-text" th:text="#{auth.forgot.password.email}">Email</span>
                            </label>
                            <input type="email"
                                   th:field="*{email}"
                                   class="input input-bordered w-full"
                                   th:classappend="${#fields.hasErrors('email')} ? 'input-error' : ''"
                                   th:placeholder="#{auth.forgot.password.email}"
                                   required
                                   autofocus />
                            <span th:if="${#fields.hasErrors('email')}"
                                  th:errors="*{email}"
                                  class="label-text-alt text-error mt-1"></span>
                        </div>

                        <div class="form-control mt-6">
                            <button type="submit" class="btn btn-primary" th:text="#{auth.forgot.password.submit}">Envoyer le lien</button>
                        </div>
                    </form>

                    <div class="divider"></div>

                    <p class="text-center text-sm">
                        <a th:href="@{/login}" class="link link-primary" th:text="#{auth.forgot.password.back}">
                            Retour à la connexion
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
