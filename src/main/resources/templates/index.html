<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{app.title}">Tuganire</title>
</head>
<body>

<!-- i18n strings injected for Alpine/JS consumption via Thymeleaf inline expressions -->
<script th:inline="javascript">
    window.tuganireMessages = {
        sttFailed:      /*[[#{error.sttFailed}]]*/      'Échec de la reconnaissance vocale.',
        errorGeneric:   /*[[#{error.generic}]]*/        'Une erreur s\'est produite.',
        notAllowed:     /*[[#{error.micNotAllowed}]]*/  'Accès au microphone refusé.',
        audioCapture:   /*[[#{error.micNotFound}]]*/    'Microphone non trouvé.',
        networkError:   /*[[#{error.network}]]*/        'Erreur réseau. Vérifiez votre connexion.',
        httpsRequired:  /*[[#{notice.speechApiUnsupported}]]*/ 'HTTPS requis en production.',
        compareTitle:   /*[[#{compare.title}]]*/   'Quelle transcription est la meilleure ?',
        compareChoose:  /*[[#{compare.choose}]]*/  'Choisir',
        translateFailed:/*[[#{error.translateFailed}]]*/ 'Échec de la traduction. Veuillez réessayer.',
        // Bubble labels + actions rebuilt client-side for the streaming path
        replay:         /*[[#{action.replay}]]*/   'Rejouer',
        thumbsUp:       /*[[#{action.thumbsUp}]]*/  'Bon',
        thumbsDown:     /*[[#{action.thumbsDown}]]*/ 'Mauvais',
        feedbackThanks: /*[[#{feedback.thanks}]]*/  'Merci pour votre retour !',
        langNameFr:     /*[[#{lang.code.fr}]]*/     'Français',
        langNameRw:     /*[[#{lang.code.rw}]]*/     'Ikinyarwanda',
        // {0} placeholder for the bubble ARIA labels — JS substitutes the language name
        ariaBubbleSource: /*[[#{aria.bubble.source('{0}')}]]*/ 'Texte source en {0}',
        ariaBubbleTarget: /*[[#{aria.bubble.target('{0}')}]]*/ 'Traduction en {0}'
    };
</script>

<div layout:fragment="content"
     x-data="conversation()"
     x-init="init()"
     class="relative flex flex-col min-h-[calc(100dvh-3.5rem)]">

    <!--
        HTTPS / browser compatibility notice.
        Shown in non-HTTPS environments or unsupported browsers via Alpine.
    -->
    <div x-show="!speechSupported"
         x-cloak
         class="bg-warning/10 border-b border-warning/30 px-4 py-2 text-center">
        <p class="text-xs text-warning-content/80">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 inline-block mr-1 -mt-0.5"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
            </svg>
            <span th:text="#{notice.speechApiUnsupported}">Reconnaissance vocale non disponible.</span>
        </p>
    </div>

    <!-- ══════════════════════════════════════════════════════════════════════════
         TWO-BUTTON MODE (default)
         ══════════════════════════════════════════════════════════════════════ -->
    <div x-show="mode === 'twoButtons'"
         x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="flex flex-col flex-1">

        <!-- ── Conversation list ──────────────────────────────────────────────── -->
        <div class="flex-1 overflow-y-auto px-4 py-4 max-w-2xl mx-auto w-full
                    scroll-smooth pb-[9rem]"
             id="conversation-list"
             role="log"
             aria-live="polite"
             th:aria-label="#{aria.conversation}">

            <!-- Empty state: shown before first translation -->
            <div x-show="bubbleCount === 0"
                 x-cloak
                 class="flex flex-col items-center justify-center h-full min-h-[55vh] text-center px-6 select-none">

                <!-- Language pair badge: clarifies direction + builds trust -->
                <div class="inline-flex items-center gap-2 mb-7 px-3 py-1.5 rounded-full bg-base-200 border border-base-300">
                    <span class="text-xs font-semibold text-primary">FR</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-base-content/40" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/>
                    </svg>
                    <span class="text-xs font-semibold text-accent">RW</span>
                </div>

                <!-- Icon -->
                <div class="mb-5 w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-primary" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 0 1-.923 1.785A5.969 5.969 0 0 0 6 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337Z"/>
                    </svg>
                </div>

                <!-- Title + value proposition -->
                <h2 class="text-lg font-semibold text-base-content mb-1.5" th:text="#{home.empty.title}">
                    Traduisez vos conversations
                </h2>
                <p class="text-sm text-base-content/60 mb-6 max-w-xs" th:text="#{home.empty.subtitle}">
                    Français ⇄ Kinyarwanda, à voix haute.
                </p>

                <!-- Hint pointing to the action buttons -->
                <p class="inline-flex items-center gap-1.5 text-xs font-medium text-base-content/50"
                   th:text="#{home.empty.hint}">
                    Choisissez une langue ci-dessous et parlez.
                </p>
            </div>

            <!-- Translation error toast -->
            <div x-show="errorMessage"
                 x-cloak
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 class="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-error text-error-content
                        rounded-lg px-4 py-3 shadow-lg text-sm font-medium max-w-sm w-full mx-auto"
                 role="alert"
                 aria-live="assertive">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
                    </svg>
                    <span x-text="errorMessage"></span>
                    <button @click="errorMessage = null" class="ml-auto btn btn-ghost btn-xs btn-circle"
                            th:aria-label="#{aria.closeError}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- ── Fixed bottom panel (two-button mode) ──────────────────────────── -->
        <!-- pb-[env(safe-area-inset-bottom)] keeps the buttons clear of the iOS home indicator -->
        <div class="fixed bottom-0 left-0 right-0 z-20 bg-base-100 border-t border-base-300
                    panel-shadow-top pb-[env(safe-area-inset-bottom)]">

            <!-- Translation progress bar: pinned to the TOP EDGE of the action bar (above the
                 buttons) so it never covers the conversation text. Shown while `processing`.
                 Wrapper handles positioning; inner .translate-progress keeps its own animation. -->
            <div x-show="processing"
                 x-cloak
                 class="absolute left-0 right-0 -top-[3px]"
                 role="progressbar"
                 th:aria-label="#{progress.translating}"
                 th:attr="aria-valuetext=#{progress.translating}">
                <div class="translate-progress"></div>
            </div>

            <!-- Listening indicator -->
            <div class="relative flex justify-center pt-3 pb-1"
                 role="status"
                 aria-live="polite"
                 x-show="recording"
                 x-cloak
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 scale-90"
                 x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-90">
                <div class="relative flex items-center justify-center w-12 h-12">
                    <span class="listening-ring listening-ring-1"
                          :style="activeLang === 'fr' ? '--ring-color: var(--color-primary)' : '--ring-color: var(--color-accent)'"></span>
                    <span class="listening-ring listening-ring-2"
                          :style="activeLang === 'fr' ? '--ring-color: var(--color-primary)' : '--ring-color: var(--color-accent)'"></span>
                    <span class="listening-ring listening-ring-3"
                          :style="activeLang === 'fr' ? '--ring-color: var(--color-primary)' : '--ring-color: var(--color-accent)'"></span>
                    <span class="relative z-10 flex items-center justify-center w-8 h-8 rounded-full shadow-sm"
                          :class="activeLang === 'fr' ? 'bg-primary' : 'bg-accent'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                        </svg>
                    </span>
                </div>
                <span class="sr-only" th:text="#{status.listening}">Écoute...</span>
            </div>

            <!-- Live transcript: shows what the mic is capturing, updated in real time -->
            <p x-show="recording && liveTranscript"
               x-cloak
               x-text="liveTranscript"
               class="px-4 pb-2 text-center text-sm text-base-content/70 italic"></p>

            <!-- Translating spinner -->
            <div class="flex justify-center pb-1"
                 x-show="translating"
                 x-cloak>
                <span class="loading loading-dots loading-sm text-primary" aria-hidden="true"></span>
                <span class="sr-only" th:text="#{status.translating}">Traduction en cours...</span>
            </div>

            <!-- Text fallback panel -->
            <div x-show="!speechSupported"
                 x-cloak
                 class="px-4 pb-2 pt-1">
                <form class="flex gap-2"
                      th:action="@{/translate}"
                      th:hx-post="@{/translate}"
                      hx-target="#conversation-list"
                      hx-swap="beforeend"
                      @htmx:before-request="translating = true; bubbleCount++"
                      @htmx:after-request="translating = false">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="sessionId" x-bind:value="sessionId">
                    <input type="hidden" name="sourceLang" x-bind:value="activeLang || 'fr'">
                    <input type="hidden" name="targetLang" x-bind:value="activeLang === 'rw' ? 'fr' : 'rw'">
                    <textarea name="sourceText"
                              rows="2"
                              class="textarea textarea-bordered flex-1 text-sm resize-none"
                              th:placeholder="#{fallback.textPlaceholder}"
                              th:aria-label="#{fallback.textPlaceholder}"
                              required></textarea>
                    <button type="submit"
                            class="btn btn-primary btn-sm self-end"
                            th:aria-label="#{fallback.send}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.269 20.876L5.999 12zm0 0h7.5"/>
                        </svg>
                    </button>
                </form>
            </div>

            <!--
                Two main voice buttons + mode toggle.
                The toggle is `shrink-0` and the two voice buttons are `flex-1 min-w-0`
                so on narrow viewports the labels truncate INSTEAD of pushing the toggle
                off-screen (fixes the orphaned/clipped floating toggle at the right edge).
            -->
            <div class="flex items-stretch gap-2 px-3 sm:px-4 pb-4 pt-2 max-w-2xl mx-auto w-full">

                <!-- Parler français (FR → RW) -->
                <button type="button"
                        class="flex-1 min-w-0 btn btn-primary min-h-14 h-14 gap-2 text-base font-semibold
                               transition-all duration-150
                               focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2
                               active:scale-[0.97]"
                        :class="recording && activeLang === 'fr'
                                 ? 'ring-4 ring-primary/30 scale-[0.98]'
                                 : 'hover:-translate-y-0.5'"
                        :disabled="recording && activeLang !== 'fr'"
                        @click="toggleRecognition('fr')"
                        :aria-label="recording && activeLang === 'fr'
                                      ? /*[[#{action.stop}]]*/ 'Arrêter'
                                      : /*[[#{button.speakFrench}]]*/ 'Parler français'"
                        :aria-pressed="recording && activeLang === 'fr'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                    </svg>
                    <span class="truncate" th:text="#{button.speakFrench}">Parler français</span>
                </button>

                <!-- Mode toggle (cleanly placed BETWEEN the two buttons; never clipped) -->
                <button type="button"
                        class="shrink-0 btn btn-ghost btn-circle min-h-11 w-11 self-center text-base-content/50
                               hover:text-primary hover:bg-primary/10 transition-colors duration-150
                               focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
                        @click="toggleMode()"
                        th:aria-label="#{aria.modeToggle}"
                        :title="mode === 'twoButtons' ? /*[[#{mode.splitScreen}]]*/ 'Écran partagé' : /*[[#{mode.twoButtons}]]*/ 'Deux boutons'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M9 4.5v15m6-15v15m-10.875 0h15.75c.621 0 1.125-.504 1.125-1.125V4.875c0-.621-.504-1.125-1.125-1.125H4.125C3.504 3.75 3 4.254 3 4.875v14.25c0 .621.504 1.125 1.125 1.125z"/>
                    </svg>
                </button>

                <!-- Kuvuga ikinyarwanda (RW → FR) -->
                <button type="button"
                        class="flex-1 min-w-0 btn btn-accent min-h-14 h-14 gap-2 text-base font-semibold text-white
                               transition-all duration-150
                               focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2
                               active:scale-[0.97]"
                        :class="recording && activeLang === 'rw'
                                 ? 'ring-4 ring-accent/30 scale-[0.98]'
                                 : 'hover:-translate-y-0.5'"
                        :disabled="recording && activeLang !== 'rw'"
                        @click="toggleRecognition('rw')"
                        :aria-label="recording && activeLang === 'rw'
                                      ? /*[[#{action.stop}]]*/ 'Arrêter'
                                      : /*[[#{button.speakKinyarwanda}]]*/ 'Kuvuga ikinyarwanda'"
                        :aria-pressed="recording && activeLang === 'rw'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                    </svg>
                    <span class="truncate" th:text="#{button.speakKinyarwanda}">Kuvuga ikinyarwanda</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════════════════════
         SPLIT-SCREEN MODE
         Top half = Mukamana (Kinyarwanda / RW), rotated 180° so she reads across
         the table. Bottom half = Doctor (French / FR).
         ══════════════════════════════════════════════════════════════════════ -->
    <div x-show="mode === 'splitScreen'"
         x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="flex flex-col flex-1 overflow-hidden"
         th:aria-label="#{aria.splitMode}">

        <!-- ── TOP: Mukamana panel (RW) — rotated 180° ──────────────────────── -->
        <div class="flex-1 flex flex-col relative overflow-hidden split-panel-rw"
             style="transform: rotate(180deg); transform-origin: center;">

            <!-- Transcript area for Mukamana -->
            <div class="flex-1 overflow-y-auto px-4 pt-4 pb-2"
                 id="split-transcript-rw"
                 role="log"
                 aria-live="polite"
                 th:aria-label="#{aria.conversation}">
                <!-- Bubbles injected by HTMX -->
            </div>

            <!-- Listening indicator — RW side -->
            <div class="flex justify-center py-1"
                 role="status"
                 aria-live="polite"
                 x-show="recording && activeLang === 'rw'"
                 x-cloak>
                <div class="relative flex items-center justify-center w-8 h-8">
                    <span class="listening-ring listening-ring-1" style="--ring-color: var(--color-accent)"></span>
                    <span class="listening-ring listening-ring-2" style="--ring-color: var(--color-accent)"></span>
                    <span class="listening-ring listening-ring-3" style="--ring-color: var(--color-accent)"></span>
                    <span class="relative z-10 flex items-center justify-center w-6 h-6 rounded-full bg-accent shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-white" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                        </svg>
                    </span>
                </div>
                <span class="sr-only" th:text="#{status.listening}">Écoute...</span>
            </div>

            <!-- RW speak button -->
            <div class="px-4 pb-4 pt-1">
                <button type="button"
                        class="w-full btn btn-accent h-14 gap-2 text-base font-semibold text-white
                               shadow-sm transition-all duration-150 active:scale-[0.97]
                               focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2"
                        :class="recording && activeLang === 'rw'
                                 ? 'ring-4 ring-accent/30 scale-[0.98]'
                                 : 'hover:shadow-md'"
                        :disabled="recording && activeLang !== 'rw'"
                        @click="toggleRecognition('rw', 'split-transcript-rw')"
                        :aria-label="recording && activeLang === 'rw'
                                      ? /*[[#{action.stop}]]*/ 'Arrêter'
                                      : /*[[#{button.speakKinyarwanda}]]*/ 'Kuvuga ikinyarwanda'"
                        :aria-pressed="recording && activeLang === 'rw'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                    </svg>
                    <span th:text="#{button.speakKinyarwanda}">Kuvuga ikinyarwanda</span>
                </button>
            </div>
        </div>

        <!-- ── Split divider with mode toggle ───────────────────────────────── -->
        <div class="split-divider flex items-center justify-center gap-3 flex-shrink-0"
             role="separator">
            <div class="flex-1 split-divider-line"></div>
            <button type="button"
                    class="btn btn-sm btn-ghost min-h-9 gap-1 text-base-content/60
                           hover:text-primary hover:bg-primary/10 transition-colors duration-150
                           focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2
                           border border-base-300 rounded-full px-3"
                    @click="toggleMode()"
                    th:aria-label="#{aria.modeToggle}">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
                </svg>
                <span class="text-xs" th:text="#{mode.twoButtons}">Deux boutons</span>
            </button>
            <div class="flex-1 split-divider-line"></div>
        </div>

        <!-- ── BOTTOM: Doctor panel (FR) — normal orientation ───────────────── -->
        <div class="flex-1 flex flex-col relative overflow-hidden split-panel-fr">

            <!-- Translating spinner (shared indicator in FR panel) -->
            <div class="flex justify-center pt-2 pb-1"
                 x-show="translating"
                 x-cloak>
                <span class="loading loading-dots loading-sm text-primary" aria-hidden="true"></span>
                <span class="sr-only" th:text="#{status.translating}">Traduction en cours...</span>
            </div>

            <!-- Translation error toast (split mode) -->
            <div x-show="errorMessage"
                 x-cloak
                 class="mx-4 mt-2 bg-error text-error-content rounded-lg px-3 py-2 text-xs font-medium"
                 role="alert"
                 aria-live="assertive">
                <div class="flex items-center gap-2">
                    <span x-text="errorMessage"></span>
                    <button @click="errorMessage = null" class="ml-auto btn btn-ghost btn-xs btn-circle"
                            th:aria-label="#{aria.closeError}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Transcript area for Doctor -->
            <div class="flex-1 overflow-y-auto px-4 pt-2 pb-2"
                 id="split-transcript-fr"
                 role="log"
                 aria-live="polite"
                 th:aria-label="#{aria.conversation}">
                <!-- Bubbles injected by HTMX -->
            </div>

            <!-- Listening indicator — FR side -->
            <div class="flex justify-center py-1"
                 role="status"
                 aria-live="polite"
                 x-show="recording && activeLang === 'fr'"
                 x-cloak>
                <div class="relative flex items-center justify-center w-8 h-8">
                    <span class="listening-ring listening-ring-1" style="--ring-color: var(--color-primary)"></span>
                    <span class="listening-ring listening-ring-2" style="--ring-color: var(--color-primary)"></span>
                    <span class="listening-ring listening-ring-3" style="--ring-color: var(--color-primary)"></span>
                    <span class="relative z-10 flex items-center justify-center w-6 h-6 rounded-full bg-primary shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-white" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                        </svg>
                    </span>
                </div>
                <span class="sr-only" th:text="#{status.listening}">Écoute...</span>
            </div>

            <!-- FR speak button -->
            <div class="px-4 pb-4 pt-1">
                <button type="button"
                        class="w-full btn btn-primary h-14 gap-2 text-base font-semibold
                               shadow-sm transition-all duration-150 active:scale-[0.97]
                               focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
                        :class="recording && activeLang === 'fr'
                                 ? 'ring-4 ring-primary/30 scale-[0.98]'
                                 : 'hover:shadow-md'"
                        :disabled="recording && activeLang !== 'fr'"
                        @click="toggleRecognition('fr', 'split-transcript-fr')"
                        :aria-label="recording && activeLang === 'fr'
                                      ? /*[[#{action.stop}]]*/ 'Arrêter'
                                      : /*[[#{button.speakFrench}]]*/ 'Parler français'"
                        :aria-pressed="recording && activeLang === 'fr'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                    </svg>
                    <span th:text="#{button.speakFrench}">Parler français</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden form used by Alpine to POST transcript via HTMX (two-button mode) -->
    <form id="transcript-form"
          class="hidden"
          th:hx-post="@{/translate}"
          hx-target="#conversation-list"
          hx-swap="beforeend"
          @htmx:before-request="translating = true; bubbleCount++"
          @htmx:after-request="translating = false; $nextTick(() => scrollToBottom())">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="sourceText"    id="transcript-text">
        <input type="hidden" name="sessionId"     id="transcript-session">
        <input type="hidden" name="sourceLang"    id="transcript-source-lang">
        <input type="hidden" name="targetLang"    id="transcript-target-lang">
    </form>

    <!-- Hidden form for split-screen HTMX submissions -->
    <form id="split-transcript-form"
          class="hidden"
          th:hx-post="@{/translate}"
          hx-swap="beforeend"
          @htmx:before-request="translating = true"
          @htmx:after-request="translating = false; $nextTick(() => scrollSplitToBottom())">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="sourceText"    id="split-text">
        <input type="hidden" name="sessionId"     id="split-session">
        <input type="hidden" name="sourceLang"    id="split-source-lang">
        <input type="hidden" name="targetLang"    id="split-target-lang">
    </form>

</div>

<!-- ── Page scripts ───────────────────────────────────────────────────────── -->
<th:block layout:fragment="scripts">
    <script th:src="@{/js/conversation.js}"></script>
</th:block>

</body>
</html>
