<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    Empty State Fragment - Standardized Empty State Pattern
    Usage: <th:block th:replace="~{fragments/empty-state :: standard(iconPath, #{title}, #{message}, #{buttonText}, @{/button/url})}"/>

    Example:
    <th:block th:replace="~{fragments/empty-state :: standard(
        'M12 4v16m8-8H4',
        #{empty.title},
        #{empty.description},
        #{empty.action},
        @{/items/create}
    )}"/>
-->
<body>
    <div th:fragment="standard(iconPath, title, message, buttonText, buttonHref)">
        <div class="flex flex-col items-center justify-center py-20 px-4 text-center
                    bg-gradient-to-br from-base-200/30 via-base-100 to-base-200/30
                    rounded-2xl border border-base-300/50">
            <!-- Icon with gradient background and ring effects -->
            <div class="w-28 h-28 rounded-2xl
                        bg-gradient-to-br from-primary/15 via-secondary/15 to-accent/15
                        flex items-center justify-center mb-8
                        shadow-lg shadow-primary/10
                        ring-4 ring-primary/5">
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-14 w-14 text-primary drop-shadow"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" th:attr="d=${iconPath}" />
                </svg>
            </div>

            <!-- Title -->
            <h2 class="text-2xl font-bold text-base-content tracking-tight mb-4"
                th:text="${title}">Empty State Title</h2>

            <!-- Message -->
            <p class="text-base-content/70 mb-10 max-w-md text-base leading-relaxed"
               th:text="${message}">Empty state message</p>

            <!-- CTA Button (only show if both buttonText and buttonHref are provided) -->
            <a th:if="${buttonText != null && buttonHref != null}"
               th:href="${buttonHref}"
               class="btn btn-primary btn-lg gap-2 rounded-xl
                      shadow-lg hover:shadow-xl hover:-translate-y-0.5
                      transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                <span class="font-semibold" th:text="${buttonText}">Action</span>
            </a>
        </div>
    </div>
</body>
</html>
