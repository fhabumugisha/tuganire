<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="apexInit">
    <script>
        /* Configure ApexCharts default theme to match DaisyUI light/dark */
        document.addEventListener('DOMContentLoaded', function () {
            var htmlEl = document.documentElement;
            var theme = htmlEl.getAttribute('data-theme') || 'light';
            var isDark = theme === 'dark' || theme === 'night' || theme === 'dracula';
            window.__apexTheme = isDark ? 'dark' : 'light';
        });
    </script>
</div>
</body>
</html>
