spring:
  main:
    banner-mode: off
  datasource:
    url: jdbc:h2:mem:tuganire;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      # Intentionally unreachable — unit tests mock the TranslationCache directly
      url: redis://localhost:16379
  ai:
    openai:
      api-key: test-key
    anthropic:
      api-key: test-key

tuganire:
  cache:
    translation-ttl-days: 1
  rate-limit:
    requests-per-minute: 1000
    requests-per-day: 100000
  llm:
    default-provider: openai
    fallback-provider: anthropic
  tts:
    default-provider: mms
    kiny-provider: mms
    french-provider: mms
  stt:
    default-provider: whisper
  mms:
    base-url: http://localhost:8000
  security:
    allowed-origins: http://localhost
