<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{auth.reset.password.title}">Réinitialiser le mot de passe</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="flex justify-center items-center min-h-[70vh]">
            <div class="card w-96 bg-base-100 shadow-xl">
                <div class="card-body">
                    <h2 class="card-title text-center justify-center text-2xl mb-4" th:text="#{auth.reset.password.title}">
                        Réinitialiser le mot de passe
                    </h2>

                    <form th:action="@{/reset-password}" method="post" th:object="${resetPasswordRequest}">
                        <input type="hidden" th:field="*{token}" />

                        <div class="form-control w-full">
                            <label class="label">
                                <span class="label-text" th:text="#{auth.reset.password.new}">Nouveau mot de passe</span>
                            </label>
                            <input type="password"
                                   th:field="*{password}"
                                   class="input input-bordered w-full"
                                   th:classappend="${#fields.hasErrors('password')} ? 'input-error' : ''"
                                   th:placeholder="#{auth.reset.password.new}"
                                   required
                                   minlength="8"
                                   maxlength="100"
                                   autofocus />
                            <label class="label" th:if="${#fields.hasErrors('password')}">
                                <span class="label-text-alt text-error" th:errors="*{password}"></span>
                            </label>
                        </div>

                        <div class="form-control w-full mt-2">
                            <label class="label">
                                <span class="label-text" th:text="#{auth.reset.password.confirm}">Confirmer le mot de passe</span>
                            </label>
                            <input type="password"
                                   th:field="*{confirmPassword}"
                                   class="input input-bordered w-full"
                                   th:classappend="${#fields.hasErrors('confirmPassword') or #fields.hasErrors('global')} ? 'input-error' : ''"
                                   th:placeholder="#{auth.reset.password.confirm}"
                                   required
                                   minlength="8"
                                   maxlength="100" />
                            <label class="label" th:if="${#fields.hasErrors('confirmPassword')}">
                                <span class="label-text-alt text-error" th:errors="*{confirmPassword}"></span>
                            </label>
                            <label class="label" th:if="${#fields.hasErrors('global')}">
                                <span class="label-text-alt text-error" th:errors="*{global}"></span>
                            </label>
                        </div>

                        <div class="form-control mt-6">
                            <button type="submit" class="btn btn-primary" th:text="#{auth.reset.password.submit}">
                                Réinitialiser
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
