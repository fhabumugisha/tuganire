<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="#{admin.llm.title}">LLM Usage</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Page header -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-base-content" th:text="#{admin.llm.title}">LLM Usage</h1>
        <p class="text-base-content/60 text-sm mt-1">Token usage and cost tracking</p>
    </div>

    <!-- KPI strip -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
        <div class="bg-base-100 border border-base-200 rounded-xl p-5">
            <p class="text-xs uppercase tracking-wider text-base-content/60 font-medium mb-1" th:text="#{admin.kpi.llm.cost.mtd}">LLM Cost MTD</p>
            <p class="text-3xl font-mono tabular-nums font-semibold">
                $<span th:text="${#numbers.formatDecimal(costMtd, 1, 4)}">0.0000</span>
            </p>
        </div>
        <div class="bg-base-100 border border-base-200 rounded-xl p-5">
            <p class="text-xs uppercase tracking-wider text-base-content/60 font-medium mb-1">Total Tokens MTD</p>
            <p class="text-3xl font-mono tabular-nums font-semibold" th:text="${tokensMtd ?: 0}">0</p>
        </div>
        <div class="bg-base-100 border border-base-200 rounded-xl p-5">
            <p class="text-xs uppercase tracking-wider text-base-content/60 font-medium mb-1">API Calls MTD</p>
            <p class="text-3xl font-mono tabular-nums font-semibold" th:text="${callsMtd}">0</p>
        </div>
    </div>

    <!-- Charts row -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-8">

        <!-- Daily cost line chart -->
        <div class="lg:col-span-2 bg-base-100 border border-base-200 rounded-xl p-6">
            <h2 class="text-sm font-semibold text-base-content mb-4" th:text="#{admin.llm.daily.cost}">Daily LLM Cost (30d)</h2>
            <div id="llm-daily-chart" class="h-64"></div>
            <script type="application/json" id="llm-daily-data" th:utext="${dailyCostJson}">[]</script>
            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var raw = document.getElementById('llm-daily-data').textContent;
                    var data = JSON.parse(raw);
                    if (data.length === 0) {
                        document.getElementById('llm-daily-chart').innerHTML =
                            '<div class="h-full flex items-center justify-center text-base-content/40 text-sm">No data</div>';
                        return;
                    }
                    new ApexCharts(document.getElementById('llm-daily-chart'), {
                        chart: { type: 'area', height: '100%', toolbar: { show: false }, fontFamily: 'Inter, sans-serif' },
                        series: [{ name: 'Cost (USD)', data: data.map(function(d) { return { x: d.date, y: parseFloat(d.cost) }; }) }],
                        colors: ['#4F46E5'],
                        fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.3, opacityTo: 0 } },
                        stroke: { curve: 'smooth', width: 2 },
                        dataLabels: { enabled: false },
                        xaxis: { type: 'datetime' },
                        yaxis: { labels: { formatter: function(v) { return '$' + v.toFixed(4); } } },
                        grid: { borderColor: 'rgba(0,0,0,0.06)' },
                        tooltip: { theme: 'light', x: { format: 'dd MMM yyyy' } }
                    }).render();
                });
            </script>
        </div>

        <!-- By-model donut -->
        <div class="bg-base-100 border border-base-200 rounded-xl p-6">
            <h2 class="text-sm font-semibold text-base-content mb-4" th:text="#{admin.llm.by.model}">Cost by Model MTD</h2>
            <div id="llm-model-chart" class="h-64"></div>
            <script type="application/json" id="llm-model-data" th:utext="${costByModelJson}">[]</script>
            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var raw = document.getElementById('llm-model-data').textContent;
                    var data = JSON.parse(raw);
                    if (data.length === 0) {
                        document.getElementById('llm-model-chart').innerHTML =
                            '<div class="h-full flex items-center justify-center text-base-content/40 text-sm">No data</div>';
                        return;
                    }
                    new ApexCharts(document.getElementById('llm-model-chart'), {
                        chart: { type: 'donut', height: '100%', fontFamily: 'Inter, sans-serif' },
                        series: data.map(function(d) { return parseFloat(d.cost); }),
                        labels: data.map(function(d) { return d.model; }),
                        colors: ['#4F46E5', '#7C3AED', '#EC4899', '#F59E0B', '#10B981'],
                        legend: { position: 'bottom', fontSize: '12px' },
                        dataLabels: { enabled: false },
                        tooltip: { y: { formatter: function(v) { return '$' + v.toFixed(6); } } },
                        plotOptions: { pie: { donut: { size: '65%' } } }
                    }).render();
                });
            </script>
        </div>

    </div>

    <!-- Top users bar chart -->
    <div class="bg-base-100 border border-base-200 rounded-xl p-6 mb-8">
        <h2 class="text-sm font-semibold text-base-content mb-4" th:text="#{admin.llm.top.users}">Top Users by Cost MTD</h2>
        <div id="llm-users-chart" class="h-56"></div>
        <script type="application/json" id="llm-users-data" th:utext="${topUsersJson}">[]</script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                var raw = document.getElementById('llm-users-data').textContent;
                var data = JSON.parse(raw);
                if (data.length === 0) {
                    document.getElementById('llm-users-chart').innerHTML =
                        '<div class="h-full flex items-center justify-center text-base-content/40 text-sm">No data</div>';
                    return;
                }
                new ApexCharts(document.getElementById('llm-users-chart'), {
                    chart: { type: 'bar', height: '100%', toolbar: { show: false }, fontFamily: 'Inter, sans-serif' },
                    plotOptions: { bar: { horizontal: true, borderRadius: 4 } },
                    series: [{ name: 'Cost (USD)', data: data.map(function(d) { return parseFloat(d.cost); }) }],
                    xaxis: { categories: data.map(function(d) { return d.email; }),
                             labels: { formatter: function(v) { return '$' + parseFloat(v).toFixed(4); } } },
                    colors: ['#4F46E5'],
                    dataLabels: { enabled: false },
                    grid: { borderColor: 'rgba(0,0,0,0.06)' },
                    tooltip: { y: { formatter: function(v) { return '$' + v.toFixed(6); } } }
                }).render();
            });
        </script>
    </div>

    <!-- Events table -->
    <div class="bg-base-100 border border-base-200 rounded-xl overflow-hidden">
        <div class="px-6 py-4 border-b border-base-200">
            <h2 class="text-sm font-semibold text-base-content">Recent Events</h2>
        </div>
        <div class="overflow-x-auto">
            <table class="table table-sm w-full">
                <thead class="bg-base-200/50">
                <tr class="text-xs uppercase text-base-content/50">
                    <th>Date</th>
                    <th>User</th>
                    <th>Provider</th>
                    <th>Model</th>
                    <th>Feature</th>
                    <th class="text-right">Prompt</th>
                    <th class="text-right">Completion</th>
                    <th class="text-right">Total</th>
                    <th class="text-right">Cost</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="evt : ${events.content}" class="hover:bg-base-200/30">
                    <td class="text-xs text-base-content/60"
                        th:text="${#temporals.format(evt.createdAt, 'dd MMM HH:mm')}"></td>
                    <td class="text-xs">
                        <a th:if="${evt.user != null}"
                           th:href="@{/admin/users/{id}(id=${evt.user.id})}"
                           class="text-primary hover:underline" th:text="${evt.user.email}"></a>
                        <span th:if="${evt.user == null}" class="text-base-content/40">—</span>
                    </td>
                    <td class="text-sm" th:text="${evt.provider}"></td>
                    <td class="text-xs font-mono" th:text="${evt.model}"></td>
                    <td class="text-xs text-base-content/60" th:text="${evt.feature ?: '—'}"></td>
                    <td class="text-right font-mono tabular-nums text-xs" th:text="${evt.promptTokens}"></td>
                    <td class="text-right font-mono tabular-nums text-xs" th:text="${evt.completionTokens}"></td>
                    <td class="text-right font-mono tabular-nums text-xs" th:text="${evt.totalTokens}"></td>
                    <td class="text-right font-mono tabular-nums text-xs">
                        $<span th:text="${#numbers.formatDecimal(evt.costUsd, 1, 6)}"></span>
                    </td>
                </tr>
                <tr th:if="${events.isEmpty()}">
                    <td colspan="9" class="text-center py-12 text-base-content/40">No LLM events recorded yet</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${events.totalPages > 1}"
             class="flex items-center justify-between px-4 py-3 border-t border-base-200">
            <p class="text-xs text-base-content/50">
                Page <span class="font-medium" th:text="${events.number + 1}"></span>
                of <span class="font-medium" th:text="${events.totalPages}"></span>
            </p>
            <div class="join">
                <a th:href="@{/admin/llm-usage(page=${events.number - 1})}"
                   th:classappend="${!events.hasPreviousPage()} ? 'btn-disabled'"
                   class="join-item btn btn-sm">«</a>
                <a th:href="@{/admin/llm-usage(page=${events.number + 1})}"
                   th:classappend="${!events.hasNextPage()} ? 'btn-disabled'"
                   class="join-item btn btn-sm">»</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
