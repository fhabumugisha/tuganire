<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
    Inline error banner (HTMX-friendly).
    Usage:
      <div th:replace="~{fragments/error-banner :: error-banner(
            message='Something went wrong',
            retryUrl='/path', retryLabel='Retry')}"></div>
-->
<div th:fragment="error-banner(message, retryUrl, retryLabel)"
     role="alert"
     class="flex items-start gap-3 p-4 rounded-lg border border-error/20 bg-error/5 text-error">
    <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
    </svg>
    <div class="flex-1 min-w-0">
        <p class="text-sm font-medium" th:text="${message}">An error occurred</p>
    </div>
    <a th:if="${retryUrl != null}"
       th:href="${retryUrl}"
       class="text-sm font-medium underline hover:no-underline transition-all"
       th:text="${retryLabel ?: 'Retry'}">Retry</a>
</div>
</body>
</html>
