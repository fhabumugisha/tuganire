<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{payment.cancel.title}">Paiement annulé</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="w-full px-4 flex items-center justify-center min-h-[60vh]">
            <div class="card bg-base-100 shadow-2xl max-w-2xl w-full">
                <div class="card-body text-center">
                    <div class="flex justify-center mb-6">
                        <div class="rounded-full bg-warning/20 p-6">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        </div>
                    </div>

                    <h1 class="text-3xl font-bold mb-4" th:text="#{payment.cancel.title}">Paiement annulé</h1>

                    <p class="text-lg mb-6" th:text="#{payment.cancel.message}">
                        Votre paiement a été annulé. Aucun frais n'a été prélevé.
                    </p>

                    <div class="alert alert-info mb-6">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <div>
                            <p th:text="#{payment.cancel.info}">
                                Vous pouvez toujours profiter du forfait gratuit.
                            </p>
                        </div>
                    </div>

                    <div class="card-actions justify-center gap-4">
                        <a th:href="@{/payment/pricing}" class="btn btn-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            <span th:text="#{payment.cancel.retry}">Réessayer</span>
                        </a>
                        <a th:href="@{/dashboard}" class="btn btn-ghost">
                            <span th:text="#{payment.cancel.back}">Retour au tableau de bord</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
